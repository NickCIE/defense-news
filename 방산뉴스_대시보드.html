 제외하고 다 연대하자\"고 했다. 이날 발언은 최근 김어준씨와 유시민 작가 등", "language": "ko"}, {"title": "韓日국방 \"교류협력 강화…특수비행팀 교류·해양구조훈련 지속\"(종합2보)", "url": "https://www.yna.co.kr/view/AKR20260628028752504", "source": "연합뉴스", "published": "2026-06-28T12:55:09+00:00", "summary": "(서울·도쿄=연합뉴스) 김철선 기자 조성미 특파원 = 한일 국방장관이 28일 서울에서 만나 양국 공군 간 특수비행팀 교류협력, 해군 수색구조훈련...", "language": "ko"}, {"title": "金·鄭, 보완수사권 신경전…宋, 鄭 겨냥 \"대통령 공격 무기로, 야당 대표냐\"(종합)", "url": "https://www.newsis.com/view/NISX20260628_0003686755", "source": "뉴시스", "published": "2026-06-28T11:12:00+00:00", "summary": "[서울·경기광주=뉴시스] 김난영 신정훈 기자 = 더불어민주당 차기 당권 경쟁자인 김민석 국무총리와 정청래 전 대표가 28일 한자리에 모였다. 서로 친분을 강조하며 화기애애한 분위기를 연출했지만, 지방선거 평가와 검찰 보완수사권 등을 두고는 신경전을 이어갔다. 김 총리와 정 전 대표는 이날 경기 광주에서 열린 6·3 지방선거 청년 당선인 워크숍에 나란히 참석했다. 당초 같은 날 참석하되 동선이 겹치지 않을 것으로 예상됐지만, 약 20분 간격으로 현장에 도착하며 같은 테이블에 앉았다. 이들은 서로 당 일정에 관해 대화를 주고받거나 농담", "language": "ko"}, {"title": "與, 전대 국면 노선투쟁…金·宋 \"확장\" vs 鄭 \"내부통합\"(종합)", "url": "https://www.newsis.com/view/NISX20260628_0003686751", "source": "뉴시스", "published": "2026-06-28T11:03:18+00:00", "summary": "[서울=뉴시스] 김난영 한재혁 기자 = 더불어민주당 8·17 전당대회 주요 당권 주자들이 28일 당 노선을 두고 설전을 벌였다. 정청래 전 대표는 진영 내부 통합을 제시했지만, 김민석 총리와 송영길 의원은 확장에 무게를 실었다. 정 전 대표는 이날 SNS에 글을 올려 \"이재명 정부의 성공과 정권 재창출을 위해서는 손잡을 수 있는 모든 범민주진보 세력이 연대해야 한다\"며 \"정권 재창출을 위해 윤 어게인 내란 옹호 세력을 제외하고 다 연대하자\"고 했다. 이날 발언은 최근 김어준씨와 유시민 작가 등 대표적인 친여 스피커들의 가세로 당내 ", "language": "ko"}, {"title": "What is the Chinese military thinking about the Iran war?", "url": "https://www.defenseone.com/ideas/2026/06/what-chinese-military-thinking-about-iran-war/414482/", "source": "Defense One", "published": "2026-06-28T10:00:00+00:00", "summary": "Let’s imagine what a senior PLA analyst might write in a memo.", "language": "en"}, {"title": "韓·日 국방장관, 서울서 양자회담", "url": "https://www.hankyung.com/article/2026062823481", "source": "한국경제 정치", "published": "2026-06-28T09:23:46+00:00", "summary": "", "language": "ko"}, {"title": "조현, 고이즈미 日방위상 면담…\"한일 안보협력, 국민정서 관련 문제\"", "url": "https://www.newsis.com/view/NISX20260628_0003686722", "source": "뉴시스", "published": "2026-06-28T09:22:51+00:00", "summary": "[서울=뉴시스] 남빛나라 기자 = 조현 외교부 장관은 28일 고이즈미 신지로 일본 방위상을 만나 협력 확대 필요성을 강조했다.  외교부에 따르면 조 장관은 이날 오후 한일 국방장관회담을 위해 방한한 고이즈미 방위상과 면담을 갖고 한일관계 전반 및 지역·글로벌 이슈에 관해 의견을 교환했다. 조 장관은 \"나라와 안동 정상회담 등 한일 셔틀외교가 각 급에서의 협력을 추동하고 있는 가운데, 양국 간 국방교류 또한 활발히 이루어지고 있다\"면서 \"격변하는 국제정세 속에서 한일 양국이 '가깝고도 가까운 이웃'으로서 협력해 나갈 필요성이 더욱 커", "language": "ko"}, {"title": "국방부, 중국·러시아 군용기 무단 KADIZ 진입에 ‘엄중 항의’ - 조선비즈 - Chosunbiz", "url": "https://news.google.com/rss/articles/CBMigwFBVV95cUxPbzJEaHJZcW82Qnd2NEhyV2hOcWNXRnU2S2JrV3JHaUFSOWluckdUTWxYSW1TeWJ5ekZNajhMYUpjbEp3eGluUWtJSlpLa0RacWloYUtkRzNPbXcwTy0yd2tEY3gyTGJ3ZC01RGRITDY2NVI4UzZkLW9tNUxjOUdBX0dVc9IBlwFBVV95cUxNMmkzVzh3MC1YcHdmNGJnVG5TRTJ4dVR3ZlhoenNsRzJNWDdEQVlGUzV5cVZwYi10Zk4tV1JsclVSVlhGTnNzTzlTWWJzamt1VWRWWlZydndXZkNyS18xa1JUa3ZGQkRUSnRhTU42S1BNOXlGRV95MnVGZWRWX3dLN00zUk9uVmdmQkZFTkZzQlFEUmpFUFBZ?oc=5", "source": "조선비즈", "published": "2026-06-28T09:21:00+00:00", "summary": "국방부, 중국·러시아 군용기 무단 KADIZ 진입에 ‘엄중 항의’ - 조선비즈    Chosunbiz", "language": "ko"}, {"title": "신장식 \"민주당과 숨 쉬듯 연대…합당은 우리 스스로 선택할 문제\"", "url": "https://www.newsis.com/view/NISX20260628_0003686713", "source": "뉴시스", "published": "2026-06-28T09:18:59+00:00", "summary": "[서울=뉴시스] 한재혁 기자 = 신장식 조국혁신당 당대표 권한대행은 28일 6·3 지방선거 이후 더불어민주당의 관계 설정과 관련 \"(민주당과) 숨 쉬듯 연대할 것\"이라면서도 \"합당은 우리 스스로 선택할 문제\"라고 했다. 신 대행은 이날 MBN '시사스페셜-정운갑의 집중분석'에 출연해 \"지난해 10월 정청래 민주당 전 대표의 합당 제안 이후 이 이슈가 (민주당) 당내에서 권력 투쟁의 소재가 됐다\"고 했다. 그는 \"(정 전 대표의) 의도 자체를 의심하지는 않는다\"면서도 \"조국혁신당은 억지로 끌려들어간 꼴이 됐다. 굉장히 어려움을 겪었다", "language": "ko"}, {"title": "국힘, 호남 반도체 투자에 \"李정부, 기업 팔 비틀어 관치행정\"(종합)", "url": "https://www.newsis.com/view/NISX20260628_0003686708", "source": "뉴시스", "published": "2026-06-28T09:15:54+00:00", "summary": "[서울=뉴시스]하지현 기자 = 국민의힘은 28일 삼성전자와 SK하이닉스의 호남 반도체 투자 발표 전망과 관련, 정부를 향해 \"공정한 절차 없는 관치행정\"이라며 공세를 펼쳤다.  최보윤 수석대변인은 이날 논평에서 \"정부의 갑작스러운 호남권 반도체 투자 발표를 두고 정치권과 시장이 일제히 우려를 표하는 것은 당연한 상식\"이라며 \"국가 백년대계인 반도체 산업을 전당대회라는 여당 내부 권력 투쟁 시기에 맞춰 정략적으로 활용하려는 의도가 투명하게 들여다보인다\"고 말했다. 이재명 대통령이 전날 SNS에 '부처 눈에는 부처가 보이고 돼지 눈에는", "language": "ko"}, {"title": "한일 국방장관, '청년 안보대화'…\"미래지향적 관계 발전 필요성 전달\"", "url": "https://www.newsis.com/view/NISX20260628_0003686703", "source": "뉴시스", "published": "2026-06-28T08:55:58+00:00", "summary": "[서울=뉴시스] 남빛나라 기자 = 한국과 일본 국방장관이 28일 서울에서 양국 청년들이 참여하는 '청년 안보대화'를 실시했다.  국방부에 따르면 안규백 국방부 장관과 고이즈미 신지로 일본 방위상은 서울 한국국방연구원(KIDA)에서 양국 대학생 등 50여 명과 함께하는 '청년 안보대화'를 개최했다.  이번 행사는 화기애애한 분위기 속에서 장관들이 청년들에게 전하고 싶은 이야기를 하고, 청년들의 질문에 답하는 순서로 진행됐다. 두 장관은 한일 청년들에게 양국 간 상호 신뢰를 바탕으로 우호적인 관계를 형성해 나가며, 호혜적·미래지향적으로", "language": "ko"}, {"title": "국방부, 'KADIZ 무단진입' 중·러에 엄중 항의·재발방지 촉구", "url": "https://www.yna.co.kr/view/AKR20260628046500504", "source": "연합뉴스", "published": "2026-06-28T08:52:41+00:00", "summary": "(서울=연합뉴스) 김철선 기자 = 국방부는 28일 중국과 러시아 군용기가 전날 한국 방공식별구역(KADIZ·카디즈)에 무단진입한 것과 관련해 당...", "language": "ko"}, {"title": "국방부 \"중·러 군용기 전날 KADIZ 무단 진입에 엄중 항의\"", "url": "https://www.newsis.com/view/NISX20260628_0003686693", "source": "뉴시스", "published": "2026-06-28T08:36:29+00:00", "summary": "[서울=뉴시스] 남빛나라 기자 = 국방부는 전날 중국·러시아 군용기가 한국방공식별구역(KADIZ)에무단 진입한 것과 관련해 28일 엄중 항의했다고 밝혔다.  국방부는 국방부 국제정책관이 이날 오후 주한 중국 국방무관과 주한 러시아 국방무관에게 엄중히 항의하고 재발 방지를 촉구했다고 밝혔다.  또 \"우리 군은 영공 수호를 위해 KADIZ에서의 주변국 항공기 활동에 대해 국제법을 준수하는 가운데 적극 대응해 나갈 것\"이라고 했다.  합동참모본부(합참)에 따르면 27일 중국과 러시아 군용기 10여 대가 동해 및 남해 KADIZ에 순차적으", "language": "ko"}, {"title": "Uganda's military chief orders shutdown of two major media outlets - Reuters", "url": "https://news.google.com/rss/articles/CBMisAFBVV95cUxQeENkZGlpMDNCZjQ0TVdqWmNIemlIRHZlMGh0cEREMlpjVEVSeW5XQzh6c3pROGE4RmFLWGliUHBXOVc4aFZfeHBSS0toQlk0aXZDRXRvT0s5SmN0NVNpaGIxNDczVmV6NU9yOHEzSk9jb2lUUjZvOTBKOUNpRkVuWFhXX1BOcGFSVV9UaDhheTFFelUzOFhyemIydW9UNzBYQkJub1VRYk1wdFZ3YWlPbg?oc=5", "source": "Reuters", "published": "2026-06-28T08:24:04+00:00", "summary": "Uganda's military chief orders shutdown of two major media outlets    Reuters", "language": "en"}, {"title": "[인사]국무조정실 const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
