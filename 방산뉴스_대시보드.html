반을 마련하는데 한계가 있었다. 특히 인공지능 시대의 도래와 함께 국방반도체가 주요 전략자산으로 부상하면서, 국방반도체 자립화와 안정적 공급망 확보가 지속 제기돼 왔다.  이에 따라 청와대 및 ", "language": "ko"}, {"title": "'무기 맞춤형 칩' 키운다…국방반도체법 국무회의 통과", "url": "https://www.hankyung.com/article/202606022667i", "source": "한국경제 정치", "published": "2026-06-02T07:43:22+00:00", "summary": "", "language": "ko"}, {"title": "한미, 안보 후속협의 돌입…오늘은 핵잠·내일은 농축·재처리 논의(종합)", "url": "https://www.newsis.com/view/NISX20260602_0003653873", "source": "뉴시스", "published": "2026-06-02T07:41:28+00:00", "summary": "[서울=뉴시스] 유자비 기자 = 한미가 지난해 10월 정상회담에서 합의한 안보 분야 후속 조치를 논의하기 위한 첫 회의를 2일 개최했다.  이날 오전 한미 정상 간 합의 사항을 담은 조인트팩트시트(공동설명자료)의 안보 분야 후속 조치를 협의하기 위한 발족(kick-off) 회의가 서울 외교부 청사에서 개최됐다. 박윤주 외교부 1차관과 앨리슨 후커 미 국무부 정무차관이 양측 수석대표로 회의 시작 부분을 주재했고, 이후에는 양국 국가안보실 주도로 분야별 세부 협의가 진행됐다. 이에 따라 한국 측은 조현우 청와대 안보전략비서관, 미 측은", "language": "ko"}, {"title": "이 대통령 \"정책 혼선주는 가짜뉴스 폐해 커…잘 살펴봐야\"(종합)", "url": "https://www.newsis.com/view/NISX20260602_0003653918", "source": "뉴시스", "published": "2026-06-02T07:39:10+00:00", "summary": "[서울=뉴시스]조재완 기자 = 이재명 대통령은 2일 \"정부 정책에 혼선을 주는 가짜뉴스는 폐해가 크므로 특히 잘 살펴봐달라\"고 말했다.  이 대통령은 이날 청와대에서 주재한 제24회 국무회의 겸 제11차 비상경제점검회의가 비공개로 전환된 후 허위사실 공표에 대한 경찰청의 댓글 수사 결과를 칭찬하면서 수사단 포상을 언급하며 이같이 당부했다고 강유정 청와대 수석대변인이 서면브리핑을 통해 전했다.  이 대통령은 또 \"경찰청이 적발한 가짜뉴스 유포 피의자 중 한 명이 군인이라는데 일반 병사인지, 직업군인인지 아니면 장교인지에 따라 처벌 수", "language": "ko"}, {"title": "부영, 3代 현역 병역명문가에 리조트·골프장 할인 혜택", "url": "https://www.newsis.com/view/NISX20260602_0003652978", "source": "뉴시스 경제", "published": "2026-06-02T07:30:00+00:00", "summary": "[서울=뉴시스] 변해정 기자 = 직계비속 3대(代)가 모두 현역 복무를 마친 병역명문가는 부영그룹 레저시설 이용 시 할인 혜택을 받게 된다.  부영은 2일 병무청과 병역명문가 예우 강화를 위한 업무협약을 체결했다고 밝혔다.  병역명문가는 3대가 성실히 병역의 의무를 마친 가문을 예우하는 제도로 2004년 도입됐다.  이번 협약에 따라 병무청에 의해 병역명문가로 선정되면 부영이 운영하는 전국 레저시설 6곳 이용 시 할인을 받을 수 있다. 해당 6곳은 무주덕유산리조트, 태백 오투리조트, 제주부영호텔&리조트, 제주부영CC, 제주 더클래식", "language": "ko"}, {"title": "강훈식 \"韓, 캐나다 안보강화 기여 의지\"…잠수함 수주 총력전", "url": "https://www.yna.co.kr/view/AKR20260602128300001", "source": "연합뉴스", "published": "2026-06-02T07:19:51+00:00", "summary": "(서울=연합뉴스) 설승은 기자 = 이재명 대통령의 전략경제협력 특사 자격으로 캐나다를 방문 중인 강훈식 대통령 비서실장은 2일 \"조달 속도, 품...", "language": "ko"}, {"title": "[6·3양산]조문관, 13일간 대장정 피날레 유세…감사·지지 호소", "url": "https://www.newsis.com/view/NISX20260602_0003653880", "source": "뉴시스", "published": "2026-06-02T07:18:59+00:00", "summary": "[양산=뉴시스] 안지율 기자 = 6·3 지방선거 더불어민주당 조문관 경남 양산시장 후보가 공식 선거운동 마지막 날인 2일 13일간의 대장정을 정리하며 시민들에게 감사와 최종 지지를 호소했다.  그는 양산의 미래를 위한 공약 이행을 약속하며 본 선거일 투표 참여를 간곡히 요청했다. 조 후보는 이날 오후 소주동 천성리버아파트 앞과 양주동 이마트 앞에서 '피날레 유세'를 펼치며 시민들과 마지막 접촉에 나섰다.  그는 \"더불어민주당에 서류를 접수하던 첫날의 떨림부터 유세차 위에서 목이 터져라 외치던 순간까지 지난 13일간의 눈물겨운 여정이", "language": "ko"}, {"title": "정연두 외교전략정보본부장, 후커 美차관 면담…한반도 이슈 등 현안 논의", "url": "https://www.newsis.com/view/NISX20260602_0003653853", "source": "뉴시스", "published": "2026-06-02T07:01:48+00:00", "summary": "[서울=뉴시스] 박준호 기자 = 정연두 외교전략정보본부장은 2일 앨리슨 후커 미국 국무부 정무차관과 면담을 갖고 북핵·미사일 등 한반도 현안 등을 논의했다.   이날 면담은 한미 정상 간 합의 사항을 담은 조인트팩트시트(공동설명자료)의 안보 분야 후속 조치를 협의하기 위한 후커 정무차관의 방한 계기로 성사됐다.  정 본부장과 후커 정무차관은 이날 회동에서 한반도 이슈를 포함한 다양한 지역 및 양자 현안에 대해 의견을 교환했다. 정 본부장과 후커 정무차관은 앞으로도 한반도 평화·안정을 위한 한미 간 협력을 강화해 나가기로 했다고 외교", "language": "ko"}, {"title": "지방선거 하루 앞으로…제주 후보들 막판 지지층 결집", "url": "https://www.newsis.com/view/NISX20260602_0003653837", "source": "뉴시스", "published": "2026-06-02T06:59:57+00:00", "summary": "[제주=뉴시스] 양영전 기자 = 6·3 지방선거를 하루 앞둔 2일 제주지역 후보들이 막판 지지세 결집에 나서고 있다. 공식선거운동 마지막날인 이날 제주지사 선거에 나선 위성곤 더불어민주당 후보는 제주시민속오일시장을 찾아 유권자들을 만났다. 저녁에는 제주시청 대학로를 찾아 선거 일정을 마무리할 계획이다. 문성유 국민의힘 후보도 제주시 농산물 직판장을 방문해 도민들과 소통했다. 저녁에는 캠프에서 선거사무소 관계자들을 격려하며 선거운동을 마칠 예정이다. 무소속 양윤녕 후보도 아침 거리 인사를 시작으로 제주 곳곳을 돌며 마지막 유세에 나선", "language": "ko"}, {"title": "전남선관위, 활동비 명목 금품제공 등 위법행위 3건 고발", "url": "https://www.newsis.com/view/NISX20260602_0003653771", "source": "뉴시스", "published": "2026-06-02T06:36:30+00:00", "summary": "[무안=뉴시스] 구용희 기자 = 전남선거관리위원회가 선거운동 활동비 명목의 금품 제공과 인공지능 기술을 이용한 허위사실 공표, 전과 관련 허위사실 공표 등 선거 공정성을 훼손한 혐의(공직선거법 위반)로 선거구민과 후보자 등 3건(4명)의 위법행위를 적발, 수사기관에 고발했다. 2일 전남선관위에 따르면 모 시장선거 후보자의 캠프관계자 A씨는 지난 달 중순께 두 차례에 걸쳐 선거구민 B씨에게 선거운동 활동비 명목으로 현금 각 300만원씩 총 600만원을 제공한 혐의를 받는다.  A씨로부터 금품을 건네받은 B씨는 지방선거 출마와 선거캠프", "language": "ko"}, {"title": "폭발사고만 8년새 3번…한화에어로, 중대재해 재범 가중될까", "url": "https://www.newsis.com/view/NISX20260602_0003653751", "source": "뉴시스 경제", "published": "2026-06-02T06:30:44+00:00", "summary": "[서울=뉴시스] 고홍주 박정영 기자 = 지난 1일 방산업체 한화에어로스페이스(한화에어로)에서 발생한 폭발 사고로 5명이 숨진 가운데, 정부가 전담수사팀을 꾸려 사고원인과 안전조치 의무 위반 여부 등을 조사하고 있다. 같은 사업장에서 2018년과 2019년에 이어 세 번째 폭발 사고가 발생한 만큼 회사의 안전보건관리체계가 제대로 작동했는지가 핵심 쟁점이 될 전망이다. 2일 고용노동부와 경찰 등에 따르면 이날 오전 10시부터 대전 유성구 외삼동 한화에어로 대전 사업장 56동에서 합동 감식을 벌이고 있다. 감식에는 경찰과 소방당국을 비롯", "language": "ko"}, {"title": "강훈식, 캐나다 국방장관 만나 \"韓, 조달속도·품질·납기신뢰성 모두 갖춘 유일한 파트너\"", "url": "https://www.newsis.com/view/NISX20260602_0003653752", "source": "뉴시스", "published": "2026-06-02T06:29:57+00:00", "summary": "[서울=뉴시스]김경록 기자 = 전략경제협력 대통령 특사 자격으로 캐나다를 방문 중인 강훈식 대통령비서실장은 2일 \"스티븐 퓨어 국방조달 국무장관, 데이비드 맥귄티 국방장관과 각각 면담했다\"며 \"조달 속도, 품질, 납기 신뢰성을 모두 갖춘 유일한 파트너인 한국을 선택하는 것은 캐나다 국방 조달개혁의 성공 사례이자 새로운 경제성장 동력이 될 수 있다고 했다\"고 전했다. 강 실장은 이날 오후 페이스북에 \"전략경제협력 대통령 특사로 지난 1월에 이어 다시 캐나다를 찾았다. 캐나다 현지 시각 6월 1일의 주요 활동 결과를 보고드린다\"며 이같", "language": "ko"}, {"title": "내년부터 연차 '시간 단위' 사용 가능…근로기준법 개정안 국무회의 의결", "url": "https://www.newsis.com/view/NISX20260602_0003653720", "source": "뉴시스", "published": "2026-06-02T06:20:18+00:00", "summary": "[서울=뉴시스] 김지은 기자 = 내년부터 하루 단위로만 사용할 수 있었던 연차 유급휴가를 시간 단위로 나눠 사용하는 것이 가능해진다. 정부는 2일 이재명 대통령 주재로 청와대에서 열린 국무회의에서 이 같은 내용을 담은 근로기준법 개정안을 비롯해 법률 공포안 40건, 대통령령안 20건 등을 심의·의결했다. 개정안에 따르면 근로자는 앞으로 연차 유급휴가를 시간 단위로 분할해 사용할 수 있게 된다. 또 근로 시간이 4시간인 경우 근로자가 휴게 시간을 사용하지 않겠다고 명시적으로 요청한 때엔 휴게 시간 없이 즉시 퇴근할 수 있도록 하는 내", "language": "ko"}, {"title": "[게시판] 육군, 청남대서 호국미술대전 역대 수상작 특별전", "url": "https://www.yna.co.kr/view/AKR20260602114200504", "source": "연합뉴스", "published": "2026-06-02T06:12:18+00:00", "summary": "▲ 육군이 6월 '호국보훈의 달'을 맞아 옛 대통령 별장인 충북 청주 청남대에서 '대한민국 호국미술대전' 역대 수상작을 모아 특별전을 연다고 2...", "language": "ko"}, {"title": "경남정보대 국방산업학과, 방산 전문가 초청 특강     const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
</body>
</html>
