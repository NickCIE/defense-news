tle": "[영상] 리투아니아 기업, 드론용 '초소형 레이저 표적 모듈' 개발", "url": "https://www.yna.co.kr/view/AKR20260612146400704", "source": "연합뉴스", "published": "2026-06-13T00:00:01+00:00", "summary": "(서울=연합뉴스) 리투아니아의 한 스타트업이 드론에 장착할 수 있는 '초소형 레이저 표적 지시 장치'를 개발했습니다.", "language": "ko"}, {"title": "북, 한미 무기거래에 \"강력 규탄…엄중한 후과 경고\"", "url": "https://www.newsis.com/view/NISX20260613_0003667816", "source": "뉴시스", "published": "2026-06-12T23:31:41+00:00", "summary": "[서울=뉴시스] 남빛나라 기자 = 북한은 도널드 트럼프 미국 행정부가 한국에 무기를 판매하기로 한 데 대해 \"미국과 한국의 무력증강 책동이 심히 우려스러운 방향에서 급속히 추진되고 있는 데 대해 강력히 규탄\"한다고 13일 반발했다. 북한 외무성 대외정책실장은 이날 조선중앙통신의 서면논평 요청에 따라 내놓은 입장에서 최근 한미 무기거래 사례를 구체적으로 언급하면서 이 같이 밝혔다. 대외정책실장은 \"그로부터 초래될 엄중한 후과에 대하여 경고한다\"며 \"미국의 무기수출은 곧 전쟁수출이며 미국산 무기의 도입은 긴장과 대결의 축적\"이라고 했다", "language": "ko"}, {"title": "North Korea condemns US missile sale approval to South Korea, KCNA says - Reuters", "url": "https://news.google.com/rss/articles/CBMiygFBVV95cUxPMUVfS3Y4MWZiZDM3M21kczdYc0dYeHhpZGo5Z0ltM3dfeTlsaWJkQUw4LU1OU0trdjhlU3k1Z1ZHRzFSaThfLVBOOE1qb3Y0YVZCeFZ6V05vaXdiQ2otZnNTR3lqeFVPbGR5c01razk1YXVfcXlDUy1oWTNrM3BhT2FDTTNHbk9MRUttVHNabG9GTEdqTkh4cjV0VzMtVjI5XzBXbWNURW8xLW1lNU5RUTFoUE5RbVphcGM0SjJ5Y1FkN1QxUk1xSU93?oc=5", "source": "Reuters", "published": "2026-06-12T21:30:09+00:00", "summary": "North Korea condemns US missile sale approval to South Korea, KCNA says    Reuters", "language": "en"}, {"title": "\"북한 해킹 군사 활동으로 진화\"-ESET 경고", "url": "https://www.newsis.com/view/NISX20260613_0003667774", "source": "뉴시스", "published": "2026-06-12T21:03:00+00:00", "summary": "[서울=뉴시스] 강영진 기자 = 북한의 해킹 작전이 정권의 군사 전략과 직결된 군사적 차원 활동으로 진화하고 있다고 국제 사이버보안 기업 이셋(ESET)이 지적했다.  미국의 소리(VOA)에 따르면 ESET의 페터 칼나이 선임 악성코드 연구원은 북한 해커들이 인공지능을 활용해 사이버 공격의 완성도를 높이고 있다는 점도 경고했다.  칼나이 연구원은 12일 북한의 사이버 역량이 정권 운영과 군사 전략에서 핵심적인 역할을 담당하고 있다고 밝혔다. 북한이 어떤 표적을 공격하는지를 보면 그 목적을 충분히 유추할 수 있다며, 북한의 사이버 작", "language": "ko"}, {"title": "[인터뷰] '40세 최연소' 이동석 충주시장 당선인 \"과감한 실행력이 무기\"", "url": "https://www.yna.co.kr/view/AKR20260611171500064", "source": "연합뉴 리와 정상회담에서 \"자유무역, 다자주의 등 분야에서 협력 발전을 위해 함께 노력해 나가기를 바란다\"고 밝혔다 이 대통령은 이날 오후 로마 총리 영빈관(빌라 마다마)에서 열린 오찬을 겸한 확대회담 모두 발언에서 \"규범 기반의 국제질서가 중요하다는 점을 지난번에도 서로 논의했다\"며 이같이 말했다. 이어 \"새로운 협력의 틀 마련이 필요한 것 같으며, 그래서 양자 관계 발전이 더욱 의미 있다고 생각한다\"며 \"우리는 서로 보", "language": "ko"}, {"title": "US Army commissions second cohort of tech executives into innovation unit", "url": "https://www.defensenews.com/news/your-military/2026/06/12/us-army-commissions-second-cohort-of-tech-executives-into-innovation-unit/", "source": "Defense News", "published": "2026-06-12T16:01:06+00:00", "summary": "This week, the Army added three more technology executives to Detachment 201, a unit intended to bridge the gap between the commercial sector and military.", "language": "en"}, {"title": "이재명 대통령, 이탈리아 대통령 이어 멜로니 총리와 정상회담 'MOU 4건 체결' [뉴시스Pic]", "url": "https://www.newsis.com/view/NISX20260613_0003667746", "source": "뉴시스", "published": "2026-06-12T15:58:32+00:00", "summary": "[서울=뉴시스]고범준 최동준 김지은 기자 = 이탈리아를 국빈 방문 중인 이재명 대통령은 12일(현지시간) 오후 로마의 빌라 마다마(영빈관)에서 조르자 멜로니 이탈리아 총리와 정상회담을 하고 양국의 협력 강화 행동 계획이 담긴 '2026-2030 한·이탈리아 전략적 행동 계획'을 채택했다. 앞서 이 대통령은 전날 세르지오 마타렐라 이탈리와 대통령과의 회담에서 양국 관계를 '특별 전략적 동반자 관계'로 격상하는데 합의, 교역·투자를 더 확대하는 한편 인공지능(AI)·방산·우주 등 미래산업, 문화와 인적교류 분야에서도 협력을 강화해 나가", "language": "ko"}, {"title": "New Pentagon UFO file reveals glowing orbs in US Northeast - Reuters", "url": "https://news.google.com/rss/articles/CBMiogFBVV95cUxOak8wUWdwdFd3TEdsYUJENHVjQ2lNbGVxTjA1d2RfTHFHUVdEMHdJR3BxS2VsM1F5emwta0tGTGlOWUlkY0xzNmZSdy1MdVpzbTUwWC1pakpuRHI4bzhza29Wci1jT3ZPNlJTSWxQcm9xS3hGT1RyZVk4OFN3eG1oR3h5X0o3SXZtbDliQ05xMlpfOEd0UW05amc5dkd3WEJYTnc?oc=5", "source": "Reuters", "published": "2026-06-12T15:34:39+00:00", "summary": "New Pentagon UFO file reveals glowing orbs in US Northeast    Reuters", "language": "en"}, {"title": "Israeli startup unveils laser system it says can kill drones in seconds - Breaking Defense", "url": "https://news.google.com/rss/articles/CBMirAFBVV95cUxNdmt0MXR0dzBfdVAzQTBXTGhEWnNkYzVpWFRzcX 03666646", "source": "뉴시스 경제", "published": "2026-06-12T00:49:51+00:00", "summary": "[서울=뉴시스]정유선 기자 = 한국교통안전공단(TS)은 지난 11일 TS김천드론자격센터에서 대구 화원고 학생들을 대상으로 '드론 진로체험 프로그램'을 운영했다고 12일 밝혔다. 국립대구과학관과 연계해 진행된 이번 행사는 청소년들에게 드론 자격 제도와 현장 운영 체계를 직접 체험할 기회를 제공하고자 마련됐다.  프로그램에 참여한 화원고 학생 20명은 센터의 안전관리 체계를 소개받고 전문가 멘토링을 통해 드론 산업의 직업 동향과 비전을 탐색하는 시간을 가졌다. 정용식 공단 이사장은 \"앞으로도 지역 사회와 긴밀히 소통하며 청소년들의 드론", "language": "ko"}, {"title": "충남·논산에 AI 국방로봇 방산 생태계 조성…국비 245억 확보", "url": "https://www.yna.co.kr/view/AKR20260612049200063", "source": "연합뉴스", "published": "2026-06-12T00:37:48+00:00", "summary": "(홍성=연합뉴스) 김준범 기자 = 충남도와 논산시가 인공지능(AI) 국방로봇 분야 방위산업 생태계 조성에 나선다.", "language": "ko"}, {"title": "충남도·논산시, 'AI 국방로봇' 산업 육성…방산클러스터 선정 - 네이트", "url": "https://news.google.com/rss/articles/CBMiU0FVX3lxTFBnMVg2bUtsYUVYcjhxczladmdhS1QtRDAzQ1dlYS10SzByb3lfSW1tUTRZUzBFSHRkMG9HNjM3V3V0Ql9rOGxiZmFSYy1UbV9kendB?oc=5", "source": "방산 뉴스", "published": "2026-06-12T00:23:00+00:00", "summary": "충남도·논산시, 'AI 국방로봇' 산업 육성…방산클러스터 선정    네이트", "language": "ko"}, {"title": "As F-35 readiness lags, Pentagon seeks $13.7 billion boost: GAO", "url": "https://breakingdefense.com/2026/06/as-f-35-readiness-lags-pentagon-seeks-13-7-billion-boost-gao/", "source": "Breaking Defense", "published": "2026-06-12T00:01:36+00:00", "summary": "The F-35’s full mission capable rate fell to to 25 percent in FY25, the government watchdog found.", "language": "en"}, {"title": "'고덕국제신도시 수자인하우스디' 견본주택 개관", "url": "https://www.newsis.com/view/NISX20260612_0003666512", "source": "뉴시스 경제", "published": "2026-06-11T23:53:39+00:00", "summary": "[서울=뉴시스]정유선 기자 = BS한양과 대보건설은 경기도 평택시 '고덕국제신도시 수자인하우스디'의 견본주택을 12일 개관하고 본격적인 분양 일정에 돌입한다고 밝혔다.  고덕국제신도시 A-67BL에 위치한 이 단지는 지하 2층~지상 최고 23층, 4개동, 총 403세대 규모로 조성된다. 주택형별 세대수는 ▲84㎡A 107세대 ▲84㎡B 90세대 ▲84㎡C 59세대 ▲101㎡ 147세대다. 전용 84·101㎡로 구성돼 중대형 주택형을 찾는 실수요자들의 관심이 예상된다. 견본주택은 평택시 고덕동 일원에 마련된다. 청약 일정은 오는 22", "language": "ko"}, {"title": "충남·논산 방산혁신클러스터, 방위사업청 공모 선정 - 웹이코노미", "url": "https://news.google.com/rs function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
</body>
</html>
