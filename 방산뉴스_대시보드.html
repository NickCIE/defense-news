 열고 퇴임 후 국회로 돌아간 뒤 청년 중심의 정치·사회 개혁과 제도 개선에 집중하겠다는 뜻을 밝혔다. 김 총리는 \"총리를 그만두고 국회로 돌아가면 본격적으", "language": "ko"}, {"title": "국힘 \"이 대통령, 한성숙 청문회 전 '다주택자 악마화' 발언 철회하라\"", "url": "https://www.newsis.com/view/NISX20260622_0003678049", "source": "뉴시스", "published": "2026-06-22T01:53:03+00:00", "summary": "[서울=뉴시스] 이승재 한은진 기자 = 정점식 국민의힘 원내대표는 22일 이재명 대통령의 다주택자 관련 발언들을 겨냥해 \"한성숙 국무총리 후보자의 인사청문회 개최 전까지 본인의 '종이 복사' 발언과 '마귀' 발언을 철회하라\"고 했다. 정 원내대표는 이날 오전 국회에서 열린 최고위원회의에 참석, \"다주택자 악마화 중심의 부동산 정책 기조를 민간 공급 확대와 주거 사다리 회복 중심 기조로 전환할 것을 촉구한다\"며 이같이 말했다. 그러면서 \"후보자 개인의 역량과 도덕성이 아무리 훌륭해도 대통령의 '종이 복사' 발언과 '마귀' 발언을 철회", "language": "ko"}, {"title": "전쟁으로 글로벌 방산 VC 투자 2배↑…\"장기 수요\" vs \"거품\"", "url": "https://www.newsis.com/view/NISX20260622_0003677803", "source": "뉴시스 경제", "published": "2026-06-22T01:47:01+00:00", "summary": "[서울=뉴시스]고재은 기자 = 잇따른 전쟁에 드론, 전장 인공지능(AI)이 주목받으면서 방산 스타트업에 투자자들이 몰리고 있다고 21일(현지 시간) 영국 파이낸셜타임스(FT)가 보도했다. 피치북 데이터에 따르면 방산 기술 분야 기업들은 올해 초부터 6월 중순까지 벤처캐피털(VC) 펀드로부터 123억 달러(약 18조8500억원)를 유치했다. 지난해 같은 기간 유치한 금액의 약 2배에 달하며, 지난해 총액(99억5000만 달러·15조2500여억원)보다도 많았다. FT는 \"전쟁으로 저렴하고 빠르게 생산할 수 있는 차세대 무기 시스템에 대", "language": "ko"}, {"title": "한화에어로, 한국 방산기업 최초 S&P 신용등급 A- 획득", "url": "https://www.yna.co.kr/view/AKR20260622063000003", "source": "연합뉴스", "published": "2026-06-22T01:42:49+00:00", "summary": "(서울=연합뉴스) 김윤구 기자 = 한화에어로스페이스[012450]가 글로벌 신용평가사 스탠더드앤드푸어스(S&amp;P)로부터 신용등급 'A-'를...", "language": "ko"}, {"title": "중국, 美 기업 46곳 정부조달 차단…방산·드론 제재 확대", "url": "https://www.hankyung.com/article/2026062200167", "source": "한국경제 국제", "published": "2026-06-22T01:39:44+00:00", "summary": "", "language": "ko"}, {"title": "[속보] 中, 록히드마틴 등 美기업 46곳 제품 정부 조달 금지", "url": "https://www.hankyung.com/article/2026062298907", "source": "한국경제 국제", "published": "2026-06-22T01:15:39+00:00", "summary": "", "language": "ko"}, {"title": "[속보] 중국, 美 군수기업 10곳 이중용도 수출 통제 제재", "url": "https://www.hankyung.com/article/2026062298777", "source": "한국경제 국제", "published": "2026-06-22T01:08:08+00:00", "summary"   "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",

  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",

  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
