T06:08:50+00:00", "summary": "[서울=뉴시스]김정현 기자 = 최근 '연어 술파티' 위증 혐의로 재판에 넘겨진 이화영 전 경기도 평화부지사가 국민참여재판에서 유죄 판결을 받은 가운데, 역대 국민참여재판의 1심 중 94% 상당은 배심원 평결과 재판부 판단이 일치한 것으로 집계됐다. 무죄를 선고 받은 피고인은 전체 13.8%로, 전국 1심 형사재판 합의부 1심보다 2.5배 더 높았다. 대법원 법원행정처가 23일 공개한 '국민참여재판 성과분석' 자료에 따르면 2008년부터 지난해까지 신청이 접수된 1심 사건은 1만1588건으로 이 중 3189건(28.0%)이 국민참여재", "language": "ko"}, {"title": "KIDA, 홍릉국방포럼 개최…한미일 등 군사력 건설 방향 논의", "url": "https://www.newsis.com/view/NISX20260623_0003680136", "source": "뉴시스", "published": "2026-06-23T05:53:59+00:00", "summary": "[서울=뉴시스] 옥승욱 기자 = 한국과 미국, 일본 등 7개국 국방·안보 전문가들이 '국방환경 변화와 각국의 군사력 건설 방향'을 논의하고 정책과 연구 성과를 공유하는 교류의 장의 열렸다.  한국국방연구원(KIDA)은 23일 오전 서울 동대문구 홍릉 국방연구원에서 '홍릉국방포럼 2026'을 개최했다고 밝혔다. 홍릉국방포럼은 KIDA가 위치한 지역인 '홍릉'과 포럼의 주제인 '국방'을 결합해 만든 포럼 명칭이다. KIDA가 주최하는 국제 안보 포럼으로 변화하는 안보 환경 속에서 주요 국방·안보 현안에 대한 논의와 협력 방안을 모색하기", "language": "ko"}, {"title": "이 대통령, '호국보훈의 달' 안보 행보…해병대 시찰·6·25 기념식 참석", "url": "https://www.newsis.com/view/NISX20260623_0003680144", "source": "뉴시스", "published": "2026-06-23T05:53:35+00:00", "summary": "[서울=뉴시스]조재완 기자 = 이재명 대통령이 6·25 전쟁 76주년을 맞아 현장 시찰 등 안보 일정에 나선다. 이번 일정은 6·25 전쟁일 주간과 호국보훈의 달을 맞아 호국영웅을 기리고 튼튼한 안보와 혁신을 통한 국방력 강화를 강조하기 위해 마련됐다고 강유정 청와대 수석대변인은 23일 언론 공지를 통해 전했다.  이 대통령은 24일 해병 부대를 방문하는 등 안보 현장을 시찰한다. 25일에는 6·25 전쟁 76주년 기념식에 참석한 뒤 참전용사 및 유가족과 위로연을 가질 예정이다. 26일에는 미래 신안보 혁신기업 육성을 주제로 전략회", "language": "ko"}, {"title": "노트르담 불 끈 로봇…한컴라이프케어 佛 방산 동맹", "url": "https://www.newsis.com/view/NISX20260623_0003680139", "source": "뉴시스", "published": "2026-06-23T05:51:04+00:00", "summary": "[서울=뉴시스]오동현 기자 = 한컴그룹 계열사이자 국방·안전 장비 전문기업 한컴라이프케어가 프랑스 방산·로봇 기업 2곳과 잇따라 전략적 파트너십을 맺고 미래 방산 시장 신성장동력 확보에 나선다. 한컴라이프케어는 프랑스 파리에서 열린 세계 최대 규모의 지상·항공 방위·안보 전시회 '유로사토리(Eurosatory 2026)'에서 ▲프랑스 CBRN(화학·생물·방사능·핵) 방호 전 문기업 '우브리(OUVRY SAS)' ▲무인지상로봇(UGV) 전문기업 '샤크로보틱스(Shark Robotics)'와 전략적 업무협약(MOU)을 체결했다고 23일", "language": "ko"}, {"title": "韓 저평가 기업, 日의 2.5배…OECD \"지배구조 개선해야\"", "url": "https://www.newsis.com/view/NISX20260623_0003679982", "source": "뉴시스 경제", "publis const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
