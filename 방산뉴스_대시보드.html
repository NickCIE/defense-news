호를 공급한다. 청년 주거와 일자리, 신혼부부의 육아, 고령자의 복지서비스를 함께 제공하는 맞춤형 공공임대주택을 확대해 주거 안정을 지원하겠다게 정부 취지다. 국토교통부는 2026년 상반기 특화주택 공모 결과 전국 14개 사업, 총 1780호를 최종 선정했다고 30일 밝혔다. 특화주택은 청년, 신혼부부, 고령자 등 입주자의 특성에 맞춰 거주 공간뿐 아니라 돌봄시설, 공유오피스, 커뮤니티 공간 등 특화시설과 맞춤형 주거서비스", "language": "ko"}, {"title": "작년 공공부문 전기·수소차 7826대 도입…전년比 5.5%p↑", "url": "https://www.newsis.com/view/NISX20260630_0003688692", "source": "뉴시스 경제", "published": "2026-06-30T02:00:00+00:00", "summary": "[세종=뉴시스]김동현 기자 = 공공부문이 지난해 7826대의 전기·수소차를 도입한 것으로 나타났다. 해당 기관의 도입 차량은 모두 8271대로 친환경차 비중은 94.6%를 차지했으며 전년대비 5.5% 포인트(p) 도입률이 상승한 것으로 집계됐다.  산업통상부와 기후에너지환경부는 30일 이 같은 내용이 담긴 지난해 차량을 신규로 구매 2025년에 차량을 신규로 구매·임차한 실적이 있는 632개 기관의 전기·수소차 구매·임차 현황을 공개했다.  산업부와 기후부는 '환경친화적 자동차의 개발 및 보급 촉진에 관한 법률'에 따라 국가기관, ", "language": "ko"}, {"title": "김정중 양양군수 1일 취임…'하나 되는 양양·다시 뛰는 양양'", "url": "https://www.yna.co.kr/view/AKR20260630071500062", "source": "연합뉴스", "published": "2026-06-30T01:35:05+00:00", "summary": "(양양=연합뉴스) 류호준 기자 = 강원 양양군은 다음 달 1일 오전 10시 양양읍 문화복지회관 공연장에서 민선 9기 김정중 군수 취임식을 개최한...", "language": "ko"}, {"title": "첨단방산학과 추진 전북대, 글로벌 방산기업과 산학협력 - 네이트", "url": "https://news.google.com/rss/articles/CBMiU0FVX3lxTFAtSGE4aElZR2FyQUw0WUpTLWRrNW92cGEwLXJVX1BZNlZXZFNKai1ZZGVTVy1uWnFoeU9fRC0tR28xZ2pMNUpIN1NjdDFHakNpbEhR?oc=5", "source": "방산 뉴스", "published": "2026-06-30T01:32:00+00:00", "summary": "첨단방산학과 추진 전북대, 글로벌 방산기업과 산학협력    네이트", "language": "ko"}, {"title": "공지통신무전기 보안·항재밍 기능 강화에 2.1조 투자…\"한미 연합작전 향상\"", "url": "https://www.newsis.com/view/NISX20260630_0003689213", "source": "뉴시스", "published": "2026-06-30T01:29:23+00:00", "summary": "[서울=뉴시스]옥승욱 기자 = 공지통신무전기가 한·미 연합작전 수행 및 한국군 간 합동작전능력 강화를 위해 보안·항재밍 기능이 강화된다. 방위사업청은 30일 서면으로 방위사업추진위원회를 열고 공지통신무전기 성능개량(SATURN) 사업추진 기본전략 수정안을 의결했다고 밝혔다.  공지통신무전기 성능개량사업은 원활한 한·미 연합작전 수행 및 한국군 간 합동작전능력 향상을 위해 공지통신무전기의 보안 및 항재밍 기능을 강화하는 성능개량 사업이다. 지난 2022년 착수해 오는 2032년까지 10년간 진행되는 이번 사업에는 약 2조1739억원이", "language": "ko"}, {"title": "Marine Corps inks first contract for autonomous ground vehicle production", "url": "https://www.defenseone.com/business/2026/06/marine-corps-inks-first-contract-autonomous-ground-vehicle-production/414517/", "source": "Defense One", "published": "2026-06-30T01:22:08+00:00", "summary": "A nearly $20 million contract aims to integrate autonomous ground vehicles in the service’s ground based air defense missions.", "language": "en"}, {"title": "\"빅맥에 감사의 마음 담았다\" 한국맥도날드, 군부대 버거 나눔", "url": "https://www.newsis.com/view/NISX20260630_0003689097", "source": "뉴시스", "published": "2026-06-30T01:20:21+00:00", "summary": "[서울=뉴시스]김상윤 기자 = 한국맥도날드는 호국보훈의 달을 맞아 동해안 경계 작전을 수행하는 육군 제23경비여단 장병들에게 '행복의 버거'를 전달했다고 30일 밝혔다. 한국맥도날드에 따르면 이번 행사는 각자의 자리에서 임무를 수행하는 국군 장병들에게 감사의 마음을 전하기 위해 마련됐다. 한국맥도날드는 육군 제23경비여단을 찾아 대표 메뉴인 '빅맥'과 음료 총 600인분을 전달했다. '행복의 버거'는 한국맥도날드가 2013년부터 이어오고 있는 대표적인 사회공헌 활동이다. '고마운 분들에게 행복을 배달합니다'라는 메시지 아래 국군 장", "language": "ko"}, {"title": "[하반기 달라지는 것] 공군 일반병 무작위 전산 선발", "url": "https://www.yna.co.kr/view/AKR20260629149900504", "source": "연합뉴스", "published": "2026-06-30T01:00:21+00:00", "summary": "◇ 국방·병무", "language": "ko"}, {"title": "통일부, 남북회담 문서 공개…치열했던 '핵통제공동위' 협상", "url": "https://www.newsis.com/view/NISX20260624_0003681966", "source": "뉴시스", "published": "2026-06-30T01:00:00+00:00", "summary": "[서울=뉴시스] 남빛나라 기자 = 남북이 상호 핵사찰 검증기구인 '핵통제공동위원회' 설치를 논의하다 결렬된 1990년대 초반 회담 문서가 공개됐다. 통일부는 1991년 12월부터 1993년 1월까지 진행된 32차례의 남북 간 핵문제 협상 과정을 기록한 문서 3836쪽을 공개한다고 30일 밝혔다. 핵문제 협의를 위한 1~3차 대표접촉, 남북핵통제공동위원회 구성·운영을 위한 1~7차 대표접촉, 남북핵통제공동위원회 접촉회의 등이다. 지난 2022년 처음으로 일반에 남북회담 문서를 공개한 이후 여덟번째 공개이다.  이번 분량은 최초로 남북", "language": "ko"}, {"title": "남북핵통제위 협상, \"도둑\"·\"간첩\" 설전…김일성 사진 찢기도", "url": "https://www.newsis.com/view/NISX20260629_0003687652", "source": "뉴시스", "published": "2026-06-30T01:00:00+00:00", "summary": "[서울=뉴시스] 남빛나라 기자 = 남북이 1990년대 초 '핵통제공동위원회' 출범을 논의할 당시 '간첩', '도둑' 등 거친 언사가 오가며 회담 분위기가 상당히 격앙됐던 사실이 확인됐다. 통일부는 30일 '남북대화 사료집' 가운데 1991년 12월부터 1993년 1월까지 진행된 32차례의 핵문제 협상 과정을 기록한 문서를 공개했다.  당시 남북은 1991년 12월 채택된 '한반도의 비핵화에 관한 공동선언'에 근거해 상호 핵사찰·비핵화 검증 기구 const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
