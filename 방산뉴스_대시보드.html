": "뉴시스", "published": "2026-06-03T16:35:26+00:00", "summary": "[산청=뉴시스] 서희원 기자 = 유명현 국민의힘 경남 산청군수 후보가 3일 치러진 지방선거에서 당선됐다. 유 후보는 4일 오전 01시07분 기준 60.87%의 득표율로 35.89%를 얻은 더불어민주당 최호림 후보를 제치고 당선을 확정지었다. 그는 당선소감을 통해 \"저 유명현에게 산청의 미래를 맡겨주신 여러분의 소중한 선택에 깊이 감사드린다\"며 \"오늘의 승리는 저 유명현 개인의 승리가 아니다. 다시 뛰는 산청을 열망하고, 새로운 산청의 도약을 희망하는 군민 모두의 승리라\"고 말했다. 이어 \"경쟁과정에서 있었던 반목과 갈등은 모두 지우", "language": "ko"}, {"title": "[당선인 인터뷰] 문정우 금산군수 \"중앙정부 예산확보 주력\"", "url": "https://www.newsis.com/view/NISX20260604_0003655229", "source": "뉴시스", "published": "2026-06-03T16:33:53+00:00", "summary": "[금산=뉴시스] 조명휘 기자 = 문정우 충남 금산군수 당선인은 중앙정부의 예산지원을 받는데 주력하겠다고 약속했다.  4년 만의 리턴매치에서 승리한 문 당선인은 당선이 확정된 뒤 인터뷰를 통해 \"집권 여당의 강력한 힘과 전폭적인 예산 지원을 끌어내 금산의 지도를 바꾸겠다\"며 이같이 말했다.  시급한 현안으로 \"농어촌 기본소득 지급으로 군민 여러분의 고단한 삶에 든든한 버팀목이 되고, 신재생에너지 첨단산업단지 조성과 청년 및 신혼부부를 위한 양질의 주거 지원에 힘쓰겠다\"고 했다.  또한 \"금산세계인삼엑스포 개최로 금산 인삼의 진가를 세", "language": "ko"}, {"title": "장길선 구례군수 당선 확실…\"전 군민 월30만원 기본소득 실현\"", "url": "https://www.newsis.com/view/NISX20260603_0003654630", "source": "뉴시스", "published": "2026-06-03T16:31:32+00:00", "summary": "[구례=뉴시스] 김석훈 기자 = 제9회 전국동시지방선거 전남 구례군수 선거는 더불어민주당 장길선(65) 후보의 당선이 확실시된다. 4일 중앙선거관리위원회 선거통계 시스템 개표 결과(개표율 58.84%)에 따르면, 이날 오전 01시18분을 기준으로 민주당 장길선 후보가 3998표(39.91%)를 기록해 2860표(28.55%)를 얻은 무소속 정현택 후보를 제치고 당선이 유력하다. 장 당선인은 \"위대한 구례군민의 지지와 응원에 깊이 감사드린다\"면서 \"선거 과정에서 분열된 구례를 하나로 화합하고 군민의 목소리를 가장 먼저 듣는 정치를 실", "language": "ko"}, {"title": "[6·3 지선] '현직 꺾고 공천' 국힘 김현수, 막판 뒤집기로 하동군수 당선", "url": "https://www.yna.co.kr/view/AKR20260604008900052", "source": "연합뉴스", "published": "2026-06-03T16:29:17+00:00", "summary": "(하동=연합뉴스) 박정헌 기자 = 6·3 지방선거 경남 하동군수 선거에서 국민의힘 김현수 후보가 개표 중반까지 열세를 딛고 역전극을 펼치며 보수...", "language": "ko"}, {"title": "[당선인 인터뷰]위성곤 제주도지사 \"도민의 도구 될 것\"", "url": "https://www.newsis.com/view/NISX20260603_0003654524", "source": "뉴시스", "published": "2026-06-03T16:28:15+00:00", "summary": "[제주=뉴시스] 양영전 기자 = 제9회 전국동시지방선거를 통해 사실상 제주도지사에 당선된 더불어민주당 위성곤(58) 당선인은 \"도민의 삶을 가장 먼저 챙기는 '민생도지사'가 되겠다\"고 약속했다. 위성곤 당선인은   "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
