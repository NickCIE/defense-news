ked Kuwait’s airport with missiles and drones, killing one person, damaging airport facilities and halting flights.", "language": "en"}, {"title": "Trump storms out of interview after being challenged about election fraud claims, DOJ fund", "url": "https://www.cnbc.com/2026/06/07/trump-election-fraud-doj-fund-weaponization-storms-out.html", "source": "CNBC", "published": "2026-06-08T13:03:22+00:00", "summary": "The president said he would like to see the weaponization fund proceed despite setbacks.", "language": "en"}, {"title": "Airbus unveils U145 autonomous helicopter drone for cargo supply ops", "url": "https://breakingdefense.com/2026/06/airbus-unveils-u145-autonomous-helicopter-drone-for-cargo-supply-ops/", "source": "Breaking Defense", "published": "2026-06-08T12:09:34+00:00", "summary": "Other military roles for the drone cover armed scouting, surveillance, crewed-uncrewed teaming as well as acting as a “mothership” for air launched effects, according to the European prime.", "language": "en"}, {"title": "Palladyne AI partners with IAI to bring Israeli Harpy, Harop drones to US", "url": "https://breakingdefense.com/2026/06/palladyne-ai-partners-with-iai-to-bring-israeli-harpy-harop-drones-to-us/", "source": "Breaking Defense", "published": "2026-06-08T11:00:00+00:00", "summary": "Palladyne plans to put new AI swarming software on the battle-proven Israeli drones and compete for contracts like the Army’s Long-Range Precision Munition (LRPM), CEO Ben Wolff told Breaking Defense.", "language": "en"}, {"title": "\"중국, 후원국 아닌 협상 대상\"…北, 핵보유국 인정 노리나", "url": "https://www.newsis.com/view/NISX20260608_0003661132", "source": "뉴시스", "published": "2026-06-08T10:59:25+00:00", "summary": "[서울=뉴시스]이기주 인턴 기자 = 북한이 시진핑 중국 국가주석의 방북을 앞두고 중국과의 관계 복원 분위기를 조성하면서도, 핵보유국 지위는 협상 대상이 아니라는 점을 분명히 하고 있다는 분석이 나왔다. 겉으로는 '혈맹'을 강조하고 있지만, 실제로는 북중 관계의 주도권을 놓고 미묘한 신경전이 이어지고 있다는 평가다. 지난 6일(현지 시간) 미국 북한 전문매체 38노스(38 North)에 따르면 최근 '시진핑 방북을 앞둔 북한의 대중(對中) 메시지 전략'이라는 제목의 분석 기사에서 북한이 최근 중국의 핵심 안보 현안인 대만·일본 문제에", "language": "ko"}, {"title": "국방부-하나금융그룹, '순직·공상 장병 및 가족 지원' 업무협약", "url": "https://www.newsis.com/view/NISX20260608_0003661084", "source": "뉴시스", "published": "2026-06-08T10:00:28+00:00", "summary": "[서울=뉴시스] 옥승욱 기자 = 국방부는 하나금융그룹과 호국보훈의 달을 맞아 8일 서울 용산구 국방부 청사에서 군 장병과 가족의 복지 증진을 위한 업무협약을 체결했다고 밝혔다.  이번 협약은 자녀 교육·치료·재활 등에 어려움을 겪는 순직·공상 장병의 가족 및 공상을 입은 장병 본인을 지원하고자 하나금융그룹이 '히어로 위드 하나' 프로그램을 제안하면서 체결됐다. 협약식에는 안규백 국방부 장관과 함영주 하나금융그룹 회장이 참석했다.  협약 체결을 계기로 하나금융그룹은 ▲장애를 가진 자녀 또는 부모를 부양 중인 장병 대상 치료비 및 의료", "language": "ko"}, {"title": "독일 4월 산업수주 전월비 3.8%감소…\"2분기 역성장 우려\"", "url": "https://www.newsis.com/view/NISX20260608_0003661070", "source": "뉴시스 경제", "published": "2026-06-08T09:14:27+00:00", "summary": "[서울=뉴시스]이재준 기자 = 유럽 최대 경제국 독일의 제조업 선행 경기를 파악할 수 있는 2026년 4월 산업수주(공장수주)는 전월 대비 3.8% 줄었다고 RTT 뉴스와 dpa 통신, 마켓워치가 8일 보도했다. 매체는 독일 연방통계청이 이날 발표한 4월 공장수주 지수(계절조정 속보치)를 인용해 이같이 전했다. 시장에서는 2.0% 감소한다고 예상했는데 실제로는 감소폭이 1,8% 포인트나 확대했다.  이란전쟁으로 인한 가격 상승 우려로 발주를 앞당기면서 수주가 대폭 증가한 전월에 대한 반동 요인에 더해 자동차와 전기장비 등 주요산업의", "language": "ko"}, {"title": "이란·이스라엘, 미사일 난타전…트럼프 \"이제 그만\"", "url": "https://www.hankyung.com/article/2026060841651", "source": "한국경제 국제", "published": "2026-06-08T09:02:55+00:00", "summary": "", "language": "ko"}, {"title": "李대통령 \"日에 군수지원협정 어렵다 말해\"", "url": "https://www.hankyung.com/article/2026060841221", "source": "한국경제 정치", "published": "2026-06-08T08:57:44+00:00", "summary": "", "language": "ko"}, {"title": "日, 북중 정상회담서 '두만강 출해권' 논의 촉각…\"안보전략 변수\"", "url": "https://www.newsis.com/view/NISX20260608_0003660882", "source": "뉴시스", "published": "2026-06-08T08:51:38+00:00", "summary": "[서울=뉴시스] 신효령 기자 = 일본 언론들이 북중 정상회담에서 중국의 두만강 출해권 문제를 논의할지 주목하고 있다. 중국이 오랜 숙원인 '두만강 하류 개발을 통한 동해 진출권(출해권)'을 얻을 경우 일본의 해양 안보전략에도 변화가 불가피하기 때문이다.  8일 니혼게이자이신문(닛케이) 등 현지 언론들은 \"시진핑 중국 국가주석은 방북을 앞두고 두만강 항로와 동해 진출에 강한 관심을 보이고 있다\"며 \"이 문제는 중국의 동해 직통 항로 확보와 연결된다\"고 보도했다. 중국은 오래전부터 지린성에서 두만강을 거쳐 동해로 진출하는 구상을 추진해", "language": "ko"}, {"title": "중동전쟁 여파에 비료값 인상…농가 부담은 포대당 880원으로↓", "u  폐지\"", "url": "https://www.newsis.com/view/NISX20260608_0003660532", "source": "뉴시스", "published": "2026-06-08T06:30:00+00:00", "summary": "[세종=뉴시스]임소현 기자 = 박홍근 기획예산처 장관이 8일 \"뼈를 깎는 구조조정은 올해가 아니면 할 수 없다\"며 재량지출 15%, 의무지출 10% 감축과 사업 수 10% 폐지 방침을 제시했다. 기획처는 교육교부금과 구직급여, 기초연금 등 주요 재정사업 개편 필요성을 공개적으로 논의하며 2027년도 예산안 편성을 위한 지출구조조정 작업에 본격 착수했다. 박 장관은 이날 서울 마포구 SVC서울에서 열린 '지출구조조정 열린 토론회'에서 \"2027년 예산안은 예산편성 전 과정을 이재명 정부가 오롯이 주관하는 첫 예산안\"이라며 이같이 밝혔", "language": "ko"}, {"title": "장동혁, 李 기자회견에 \"국민과 다른 세상 살아…사법질서에 가장 큰 위협\"", "url": "https://www.newsis.com/view/NISX20260608_0003660706", "source": "뉴시스", "published": "2026-06-08T06:28:16+00:00", "summary": "[서울=뉴시스]김지훈 우지은 기자 = 장동혁 국민의힘 대표는 8일 이재명 대통령의 취임 1년 기자회견에 대해 \"이재명의 유니버스가 따로 있다는 사실을 다시 한번 실감할 수 있었다\"고 했다.   장 대표는 이날 오후 국회에서 현안 관련 기자회견을 열어 \"이재명은 분명 국민과 다른 세상에 살고 있다. 이재명의 세상에는 국민은 없다. 참담하다\"라며 이같이 말했다.  장 대표는 \"부동산 지옥으로 고통받는 국민에 대한 일말의 미안함도 찾아볼 수 없었다. 대폭등이 아니라 정상화라고 억지 부렸다. 서울 집값은 잘 막았다며 보유세 인상을 들먹였다", "language": "ko"}, {"title": "국방홍보원장에 배종호 전 KBS기자 내정…10일 취임", "url": "https://www.newsis.com/view/NISX20260608_0003660731", "source": "뉴시스", "published": "2026-06-08T06:28:05+00:00", "summary": "[서울=뉴시스] 옥승욱 기자 = 국방부 산하 공공기관인 국방홍보원장에 배종호 전 KBS 기자가 내정됐다.  8일 정부에 따르면 국방부는 인사혁신처를 통한 개방형 직위 공모에서 배 전 기자를 제16대 국방홍보원장(고위공무원 나급)으로 내정했다. 배 전 기자는 오는 10일 취임할 예정이다. 배 전 기자는 KBS 뉴욕특파원 출신으로 세한대 초빙교수, 한국정치평론가협회 초대 회장 등을 지냈다. 국방홍보원은 KFN(옛 국방TV)과 국방일보, 국방FM, 국방저널, 국방누리 등을 운영하는 국방부 직할 종합미디어 기관이다.  윤석열 정부 당시 1", "language": "ko"}, {"title": "전재수 부산시장 인수위, 이번주 출범…정무라인도 관심", "url": "https://www.newsis.com/view/NISX20260608_0003660686", "source": "뉴시스", "published": "2026-06-08T06:19:10+00:00", "summary": "[부산=뉴시스]원동화 기자 = 더불어민주당이 8년 만에 부산시장을 탈환한 가운데 전재수 당선인이 이번 주 중 인수위원회(인수위) 구성을 발표할 것으로 알려지면서 민선9기 시정 밑그림에 관심이 쏠리고 있다. 8일 지역 정치권에 따르면 부산시장직 인수위 사무실은 부산진구 부산시 상수도사업본부에 마련될 것으로 알려졌다. 부산시청과 도보로 5분 가량 떨어진 곳이다. 전 당선인은 지난 5일 부산시선거관리위원회 당선증 교부식 이후 기자들과 만나 \"다음주 인수위원회 관련 구상을 밝히겠다\"고 말했다. 지역 정치권에서는 인수위원장 후보군으로 민주당", "language": "ko"}, {"title": "Chinese 2", "source": "뉴시스", "published": "2026-06-08T05:40:17+00:00", "summary": "[서울=뉴시스] 문예성 기자 = 시진핑 중국 국가주석이 8일 북한 국빈방문 일정을 시작한 가운데 김정은 북한 국무위원장이 평양 김일성광장에서 시 주석을 위한 성대한 환영식을 개최했다. 중국중앙(CC)TV에 따르면 이날 정오께 김일성광장에서 환영식이 열렸다. 김일성광장 중앙에는 양국 정상의 대형 초상화가 내걸렸고, 광장 양측에는 중국어와 한국어로 작성된 ‘조중우의 만고장청’, ‘깨뜨릴 수 없는 조중우의 단결 만세’ 등의 구호가 설치됐다. 중국과 북한 국기도 광장을 가득 메웠다. 시 주석과 부인 펑리위안 여사가 차량을 타고 광장에 도착", "language": "ko"}, {"title": "한국노총 \"李 기자회견서 최저임금 등 노동현안 언급 없어\"", "url": "https://www.newsis.com/view/NISX20260608_0003660601", "source": "뉴시스", "published": "2026-06-08T05:39:57+00:00", "summary": "[세종=뉴시스]박정영 기자 = 한국노동조합총연맹(한국노총)이 이재명 대통령의 취임 1주년 기자회견에 주요 노동 현안이 언급되지 않았다며 아쉬움을 표현했다.  한국노총은 8일 논평을 내고 \"'초격차 성장'과 '대체 불가 대한민국'이라는 거대한 비전에 비해 노동자 삶의 질 개선을 위한 핵심 노동 의제를 찾아보기 어려웠다는 점에서 아쉬움이 남는다\"며 이같이 말했다.  한국노총은 \"이 대통령 취임 1주년 기자회견은 지난 1년간의 민주주의 회복과 국정 정상화 성과를 돌아보고, 향후 4년의 국가 비전을 제시했다는 점에서 의미가 있다\"며 \"내란", "language": "ko"}, {"title": "민주당 전북도당 선대위 해단 \"전북 대도약을 위해 다시 뛴다\"", "url": "https://www.newsis.com/view/NISX20260608_0003660411", "source": "뉴시스", "published": "2026-06-08T05:31:34+00:00", "summary": "[전주=뉴시스] 김민수 기자 = \"전북대도약 이제 시작입니다.\"  도지사를 비롯해 14개 시장·군수 전 기초단체장직을 석권한 더불어민주당 전북특별자치도당 선거대책위원회(총괄상임선대위원장 윤준병)가 8일 제9회 전국동시지방선거 선거대책위원회 해단식을 갖고 전북 대도약을 다짐했다. 이날 해단식에는 윤준병 총괄상임선대위원장을 비롯해 공동상임선대위원장, 전북특별자치도 이원택 광역단체장 당선인, 14개 시·군 기초단체장 당선인, 광역의원 당선인, 주요 선대위 관계자 등이 참석했다.  참석자들은 이번 지방선거 과정에서 보여준 도민들의 성원과 ", "language": "ko"}, {"title": "FT \"한국, 세계 경제 승자로 부상…칩 팔고 탱크·화장품도 판다\"", "url": "https://www.newsis.com/view/NISX20260608_0003660453", "source": "뉴시스 경제", "published": "2026-06-08T05:29:57+00:00", "summary": "[서울=뉴시스]박미선 기자 = 한국이 인공지능(AI) 경쟁과 전 세계 군비 확충 흐름의 대표적 수혜국으로 부상하고 있다고 7일(현지 시간) 파이낸셜타임스(FT)가 보도했다.  FT는 반도체와 조선, 방산 산업이 호황을 누리면서 한국 경제 전반에 활력을 불어넣고 있다고 평가했다. 한국 경제는 올해 1분기 전년 동기 대비 3.6% 성장했으며, 수출은 38% 증가한 2200억 달러로 사상 최대를 기록했다. 서울 소재 컨설팅업체 인사이트 커뮤니케이션스의 마이클 브린 대표는 \"경제의 여러 부문이 현재 최적의 환경에 놓여 있다\"며 \"에너지 수", "language": "ko"}, {"title": "Macron’s nuclear pact expands across Scandinavia as global forc const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
