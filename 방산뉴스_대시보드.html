hed": "2026-06-11T21:00:00+00:00", "summary": "[세종=뉴시스]김동현 기자 = 여한구 산업통상부 통상교섭본부장은 한-모로코 간 통상·산업 협력을 가속화하기 위해 지난 11일부터 12일까지 모로코를 방문해 양국 간 경제협력 및 기업 지원방안을 논의했다.  여 본부장은 지난 11일 오마르 헤지라 모로코 통상담당 국무장관과의 회담을 통해 교역·투자 활성화를 비롯한 경제협력 방안을 협의했다. 회담을 통해 양국은 국장급 작업반을 신설하는 데 합의했다.  향후 신설되는 국장급 작업반을 중심으로 조속한 시일 내에 한-모로코 포괄적 경제동반자협정(CEPA) 협상을 개시할 수 있도록 긴밀히 협력", "language": "ko"}, {"title": "What It Would Take To Seize Iran’s Kharg Island According To Top Former Military Leaders", "url": "https://www.twz.com/news-features/what-it-would-take-to-seize-irans-kharg-island-according-to-top-former-military-leaders", "source": "The War Zone", "published": "2026-06-11T20:45:28+00:00", "summary": "Kharg Island, the epicenter of Iran's energy exports, is in the news again today after Trump declared he would seize it, before changing his tune.  \n The post  What It Would Take To Seize Iran’s Kharg Island According To Top Former Military Leaders  appeared first on  The War Zone .", "language": "en"}, {"title": "UK defence minister quits, says Starmer not spending enough to keep country safe - Reuters", "url": "https://news.google.com/rss/articles/CBMiqgFBVV95cUxNUHR5cUxPVW1vQ0M1TVNiTTlObF9QdmFpbHNfQTJSdG5DMEJlRVdwdENYS3NBNC1qTTJacVBBZlpyS3JfdUhUclc2LXJEV2FzdHkwVnBvYk94blNoWmJXNWlOay1sM21nQ1ZIZFpQZ1pWQjctWTRoR3BhdFRGaDAxUFgwNWQ5TUFIZzktWERwQUZHUElwTkpRSHkwTFhsSmpjRDJ2OUJ4MmhwZw?oc=5", "source": "Reuters", "published": "2026-06-11T20:41:02+00:00", "summary": "UK defence minister quits, says Starmer not spending enough to keep country safe    Reuters", "language": "en"}, {"title": "\"종료시점 예단 힘들어\"…석유 최고가격제 출구전략 불투명", "url": "https://www.newsis.com/view/NISX20260610_0003663078", "source": "뉴시스 경제", "published": "2026-06-11T20:00:00+00:00", "summary": "[세종=뉴시스]김동현 기자 = 이재명 대통령이 중동전쟁 이후 급등한 물가를 안정화시키기 위해 석유 최고가격제 유지를 시사함에 따라 국제유가가 90달러 수준에서 안정세를 보이면 종료하려 했던 출구 전략이 불투명해졌다는 지적이 제기된다.  물가 안정이라는 기준이 새롭게 제시된 만큼 6월 중 중단도 쉽지 않을 수 있고 여름 휴가철을 맞아 석유류 제품 소비가 급등하는 7~8월과 물가에 민감한 추석 전까지 종료 시점을 찾기 어려울 것이라는 의견도 들린 const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
