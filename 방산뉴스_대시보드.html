"summary": "(서울=연합뉴스) 김철선 기자 = 해병대는 방미 중인 주일석 사령관(중장)이 2일(현지시각) 미국 펜타곤에서 에릭 스미스 미 해병대사령관(대장)...", "language": "ko"}, {"title": "안규백 장관 \"장병들 창업 환경 조성 적극 지원할 것\"", "url": "https://www.newsis.com/view/NISX20260604_0003656684", "source": "뉴시스", "published": "2026-06-04T06:44:02+00:00", "summary": "[서울=뉴시스] 옥승욱 기자 = 안규백 국방부 장관은 4일 군 복무 기간 장병들의 창업 환경 조성에 적극 지원할 것이라고 밝혔다.  안 장관은 이날 오후 국방컨벤션에서 역대 국방창업경진대회 출신 청년 창업인들과 오찬 간담회를 가졌다.  이번 간담회는 지난 2월 4일 이후 올해 두번째로 열린 것이다. 군 복무 경험을 자산 삼아 혁신적인 성장을 이뤄낸 청년 기업가들을 격려하고, 창업인들이 겪는 어려움과 건의사항 등 생생한 현장의 목소리를 청취하기 위해 마련됐다.  간담회에서는 '창업 중심 사회 전환'을 위한 국방부의 역할과 지원방안 등", "language": "ko"}, {"title": "金총리 \"범정부 역량 결집해 드론 수요 창출\"…전략추진단 구성(종합)", "url": "https://www.yna.co.kr/view/AKR20260604110751001", "source": "연합뉴스", "published": "2026-06-04T06:34:23+00:00", "summary": "(서울=연합뉴스) 이상현 기자 = 정부가 '국가 드론·대(對)드론 전략추진단'을 구성하고 2조원 규모의 공공 수요를 발굴키로 했다.", "language": "ko"}, {"title": "정부, 북 억류 함진우씨 가족 납북피해자 인정…위로금 지급", "url": "https://www.newsis.com/view/NISX20260604_0003656625", "source": "뉴시스", "published": "2026-06-04T06:32:34+00:00", "summary": "[서울=뉴시스] 남빛나라 기자 = 정부가 올해 초 '억류자'로 공식 분류된 북향민(탈북민) 언론인 함진우씨의 가족을 납북피해자로 인정하고 위로금을 지급하기로 했다. 통일부는 4일 '군사정전에 관한 협정 체결 이후 납북피해자의 보상 및 지원에 관한 법률(전후납북자법)'에 근거해 납북피해자 보상 및 지원 심의위원회를 개최하고 이 같이 결정했다. 피해 위로금은 월 최저임금액에 납북 기간을 곱한 금액을 월 최저임금액 36배 한도 내에서 지급한다. 이번 위로금은 약 1900만원 규모다. 북한 전문 매체의 기자로 활동하던 함씨는 2017년 5", "language": "ko"}, {"title": "국방·산업부, K-방산 수출 확대 위해 범정부 협력 강화 - 신아일보", "url": "https://news.google.com/rss/articles/CBMicEFVX3lxTE5Hc0Z0UzFFQlhEZkx4LV9nMmRURUd4UzREREJEOXJERGdXMllxRjFXajFIZmlFR2dKd3dZSndNRHlaUXNkS1pQNGt1VXY0aDIyTkdmYVliMmhCcGZWcE1LR0NJZWZ2YzFjWWR4elByYmM?oc=5", "source": "방산 뉴스", "published": "2026-06-04T06:31:42+00:00", "summary": "국방·산업부, K-방산 수출 확대 위해 범정부 협력 강화    신아일보", "language": "ko"}, {"title": "국방부·산업부, 제12회 방위산업발전협의회 개최…방산수출·AI 논의 - BBS불교방송", "url": "https://news.google.com/rss/articles/CBMia0FVX3lxTE1zN3ZVY2pMRGUtcldsbDhQQWFQaW5sUTZFTFFSYnhySTE3ZlVqWU9nODVpLW91bWRpbE9mYU52RWVBNEZPellFZ3 function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";

  } catch{ return ""; }
}

    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
</body>
</html>
