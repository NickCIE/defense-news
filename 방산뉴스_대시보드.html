://www.newsis.com/view/NISX20260604_0003655458", "source": "뉴시스", "published": "2026-06-03T19:50:43+00:00", "summary": "[옥천=뉴시스]연종영 기자 = 농어촌 기본소득으로 무장하고 선거전에 뛰어든 더불어민주당 황규철(59) 충북 옥천군수가 재선 고지를 밟았다. 9회 전국동시지방선거 개표(4일 오전 4시 기준) 결과 황 당선인의 득표율은 55.8%(1만7754표), 국민의힘 전상인 후보 득표율은 42.0%(1만3359)%다. 무효는 2.1%(679표). 두 후보의 득표율 격차는 21.0%포인트다. 8년 전 군수선거에 도전했던 전 후보의 만만찮은 압박이 예상됐지만, 결과는 황 당선인의 압승으로 끝났다. 황 당선인은 대군민 메시지를 통해 \"보다 나은 미래로", "language": "ko"}, {"title": "이재영, 증평군수 재선 성공…'스마트 20분 도시' 탄력(종합)", "url": "https://www.newsis.com/view/NISX20260604_0003655483", "source": "뉴시스", "published": "2026-06-03T19:45:20+00:00", "summary": "[증평=뉴시스] 서주영 기자 = 이재영 더불어민주당 충북 증평군수 후보가 재선에 성공했다. 4일 오전 개표율 100% 기준 이 당선인은 2499표, 13.37%포인트(p) 차이로 이민표 국민의힘 후보를 제치고 당선됐다. 상대적으로 높은 정당 지지율과 현직 프리미엄이 승리의 배경으로 분석된다. 이 당선인의 연임으로 증평역 통행 불편 해소와 공동주택 문제 해결 등 주요 현안 사업이 한층 탄력받을 것으로 보인다. 특히 1호 공약으로 내건 '스마트 20분 도시' 조성 사업이 핵심 과제로 추진될 전망이다. 이 당선인은 \"의료·돌봄·교육·문화", "language": "ko"}, {"title": "[인터뷰] 박정주 홍성군수 당선인 \"홍성 경제 대혁신 실천할 것\"", "url": "https://www.yna.co.kr/view/AKR20260604028500063", "source": "연합뉴스", "published": "2026-06-03T19:40:52+00:00", "summary": "(홍성=연합뉴스) 김준범 기자 = 국민의힘 박정주 충남 홍성군수 당선인은 4일 \"군민의 이야기를 먼저 듣고, 약속한 '홍성 경제 대혁신'을 반드...", "language": "ko"}, {"title": "131표 차 남해군수 선거, 재검표 결정…최종 결과 촉각", "url": "https://www.newsis.com/view/NISX20260604_0003655324", "source": "뉴시스", "published": "2026-06-03T19:35:03+00:00", "summary": "[남해=뉴시스] 차용현 기자 = 경남 남해군수 선거가 초박빙 승부 끝에 재검표 국면으로 접어들었다. 4일 오전 4시30분 현재 개표율 100%를 기록한 가운데 더불어민주당 류경완 후보가 1만3924표(50.23%)를 얻어 국민의힘 류성식 후보 (1만3793표·49.76%)를 131표 차로 앞서고 있다. 류성식 후보 측은 무효표 380여 표를 포함한 전체 투표지에 대한 재검표를 요구하며 선거관리위원회에 이의를 제기했다. 이에 따라 선관위는 무효표 처리 과정의 적정성과 재검표 실시 여부 등을 논의한 끝에 전체 투표지를 대상으로 수개표로", "language": "ko"}, {"title": "[당선인 인터뷰]최재구 예산군수 다시 \"하나된 예산, 더 큰 도약\"", "url": "https://www.newsis.com/view/NISX20260604_0003655473", "source": "뉴시스", "published": "2026-06-03T19:32:13+00:00", "summary": "[예산=뉴시스]김덕진 기자 = 최재구 예산군수 당선인이 재선에 성공하며 \"무거운 책임감으로 군민의 뜻을 받들겠다\"고 말했다. 그는 \"군 (무·60·대학교수) ◇담양군수", "language": "ko"}, {"title": "[프로필]신용한 충북지사 당선인", "url": "https://www.newsis.com/view/NISX20260604_0003655440", "source": "뉴시스", "published": "2026-06-03T18:43:27+00:00", "summary": "[청주=뉴시스] 이도근 기자 = 더불어민주당 신용한(57) 충북지사 당선인은 기업 경영과 방송, 학계를 두루 거친 실물 경제·정책 전문가로 통한다. 1969년 청주시 흥덕구 강내면(옛 청원군 강내면) 한우농가에서 5남매의 장남으로 태어난 그는 강내초, 미호중, 청주고를 졸업한 청주 토박이다. 연세대에서 경영학·법학을 복수 전공했고, 연세대 대학원에서 법학석사, 성균관대 국정전문대학원에서 행정학 박사를 취득했다. 인크루트 사외이사와 극동유화그룹 최연소 회장실 사장 등을 거쳐 서원대 글로벌경영대학 석좌교수 등을 지냈다. 여러 TV·라디", "language": "ko"}, {"title": "'보수·진보 넘나든 경제 전문가' 신용한, 충북지사 당선(종합)", "url": "https://www.newsis.com/view/NISX20260604_0003655437", "source": "뉴시스", "published": "2026-06-03T18:42:29+00:00", "summary": "[청주=뉴시스] 이도근 기자 = 제9회 전국동시지방선거 충북지사 선거에서 더불어민주당 신용한(57) 후보가 당선됐다. 같은 듯 다른 이력을 가진 국민의힘 김영환 후보와의 닮은꼴 대결에서 승리하며 민주당은 4년 만에 충북지사 탈환에 성공했다. 4일 중앙선거관리위원회에 따르면 오전 3시31분 기준 충북지사 선거 개표율은 92.85%로, 신 후보는 55.05%의 득표율로 44.94%를 얻은 김 후보를 따돌리며 당선의 영예를 안았다. 득표수는 신 당선인이 41만7547표, 김 후보가 34만868표로, 득표수 차이는 7만6679표로 집계됐다", "language": "ko"}, {"title": "연임 도전 광주·전남 기초단체장 22명 중 14명 생환", "url": "https://www.newsis.com/view/NISX20260604_0003655342", "source": "뉴시스", "published": "2026-06-03T18:42:11+00:00", "summary": "[광주=뉴시스]변재훈 기자 = 6·3 제9회 전국동시지방선거에 출마한 광주·전남 현역 기초단체장 22명 중 14명이 당선되며 연임에 성공했다.  4일 중앙선거관리위원회에 따르면 광주는 5개 구청장 중 현직 4명이 도전해 모두 당선됐다. 광주 5개 기초단체장 선거에서는 현직이 출마를 단념한 북구청장을 제외한 현 구청장들이 모두 재선 또는 3선에 성공했다. 임택 동구청장 당선인은 조국혁신당 김성환 후보에게 2018년에 이어 8년만의 재대결에서 또 이기며 3선 고지에 올랐다. 2022년 지선에서 무투표 당선된 박병규 광산구청장 당선인은 ", "language": "ko"}, {"title": "민주 신용한, 충북지사 당선…\"통합·상생 도정 펼칠 것\"", "url": "https://www.newsis.com/view/NISX20260604_0003655408", "source": "뉴시스", "published": "2026-06-03T18:34:55+00:00", "summary": "[청주=뉴시스] 이도근 기자 = 제9회 전국동시지방선거 충북지사 선거에서 더불어민주당 신용한(57) 후보의 당선이 확정됐다. 4일 중앙선거관리위원회에 따르면 오전 3시30분 현재 개표율 92.85% 기준으로 신 후보는 55.05%(41만7547표)를 기록해 44.94%(34만868표)를 얻은 국민의힘 김영환 후보를 눌렀다.  선거운동 기간 내내 각종 여론조사에서 우위를 유지했지만, 선거 과정은 순탄치 않았다. 당내 경선에서 노영민 전 대통령 비서실장, 송기섭 전 진천군수, 한범덕 전 청주시장 등 쟁쟁한 인사들과 경쟁하 const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
