s://www.newsis.com/view/NISX20260619_0003676129", "source": "뉴시스", "published": "2026-06-19T06:15:23+00:00", "summary": "[서울=뉴시스]홍연우 이윤석 기자 = 12·3 비상계엄 당시 부정선거 의혹 수사를 위한 '제2수사단'을 구성하기 위해 군사기밀을 누설한 혐의로 기소된 김용현 전 국방부 장관이 1심에서 징역 3년을 선고받았다.  서울중앙지법 형사합의21부(부장판사 조순표)는 19일 김 전 장관의 군형법상 군기누설 등 혐의를 받는 김 전 장관에게 징역 3년을 선고했다. 내란 특검팀(특별검사 조은석)은 징역 5년을 구형한 바 있다. 재판부는 \"김 전 장관은 당시 국방부 장관으로 군사기밀 및 군인 개인정보를 보호해 안전을 확립할 필요가 있었고, 누구보다 ", "language": "ko"}, {"title": "李대통령 \"방위비, 지금도 충분히 분담…트럼프 대통령에게 '한반도 방위 스스로 책임지겠다'고 얘기\"", "url": "https://www.newsis.com/view/NISX20260619_0003676136", "source": "뉴시스", "published": "2026-06-19T06:14:21+00:00", "summary": "[서울=뉴시스]김경록 기자 = 이재명 대통령은 19일 주한미군 방위비 분담금에 대해 \"지금도 충분히 분담하고 있는데 뭘 추가 분담하냐는 게 제 생각\"이라고 말했다. 이 대통령은 이날 오후 청와대 춘추관에서 8박 10일 유럽 순방 및 G7 정상회의 참석 관련 성과 브리핑을 열고 지난 16~17일 G7 정상회의 참석 계기로 도널드 트럼프 대통령과 나눈 대화 중 \"방위비 분담금 얘기는 전혀 나오지 않았다\"면서도 이같이 자신의 생각을 밝혔다. 또한 \"미국 측도 대선 선거 과정에서 '주한미군에 대한 방위비 분담을 10배를 받겠다' 이런 얘기", "language": "ko"}, {"title": "내년부터 하사로 5년 근무하면 중사 진급 보장된다", "url": "https://www.newsis.com/view/NISX20260619_0003676068", "source": "뉴시스", "published": "2026-06-19T06:00:00+00:00", "summary": "[서울=뉴시스] 옥승욱 기자 = 2027년부터 육군 하사로 5년 근무하면 중사 진급이 보장된다. 기존에는 6년을 근무해야 중사로 자동 진급됐지만 이보다 1년 더 빨라진 것이다.  육군은 이같은 내용을 골자로 하는 부사관 종합발전 4.0을 추진하고 있다고 19일 밝혔다.  우선 육군은 중사 진급 소요기간이 과도하게 길어 획득환경에 악영향을 미친다는 야전의 목소리를 반영, 중사 진급 정체현상 해소를 위해 중사 근속진급 기간을 단축한다.  이에 따라 내년부터는 하사에서 중사로의 근속진급 기간이 기존 6년에서 5년으로 1년 줄어든다. 20", "language": "ko"}, {"title": "산업연 \"제조업 AX 전환 확산에 인프라 구축 선행돼야\"", "url": "https://www.newsis.com/view/NISX20260619_0003675442", "source": "뉴시스 경제", "published": "2026-06-19T06:00:00+00:00", "summary": "[세종=뉴시스]이수정 기자 = 제조업 인공지능 전환(AX) 확산을 위해 산업 데이터와 운영기술(OT)-정보기술(IT) 융합 등을 아우르는 인프라 구축이 선행돼야 한다는 진단이 나왔다. 산업연구원과 한국산업은행은 19일 서울 여의도 산업은행 IR센터에서 '제조업 AX의 대내외 동향·이슈, 향후 전망'을 주제로 제11차 공동세미나를 개최했다고 밝혔다. 양 기관은 2021년부터 정례 세미나를 열고 주요 산업 동향과 정책 방향을 논의해오고 있다. 이날 세미나에서는 ▲한국 제조업 AX의 구조적 한계와 대응 방향 ▲자율제조를 위한 AI 에이전", "language": "ko"}, {"title": "이 대통령, 캐나다 잠수함 수주에 \"상당히 기대하지만 호락호락하지 않아\"", "url": "https://www.newsis.com/view/NISX20260619_0003676091", "source": "뉴시스", "published": "2026-06-19T05:57:52+00:00", "summary": "[서울=뉴시스] 김지은 기자 = 이재명 대통령은 19일 최대 60조원 규모의 캐나다 차세대 잠수함(CPSP) 사업 수주 가능성에 대해 기대하고 있지만 낙관하기는 어렵다고 밝혔다. 이 대통령은 이날 오후 청와대 춘추관에서 열린 유럽 순방 성과 브리핑에서 관련 질문을 받고 \"(이번 순방에서) 독일 총리를 먼저 만나고 그다음에 캐나다 총리를 만났는데, 결과에 대해서 전혀 감을 잡을 수 없었다\"며 이같이 말했다. 이어 \"우리의 종합적인 판단으로는 상당히 기대하고 있기는 한데 낙관하기는 그렇게 호락호락하지는 않다\"며 \"감을 잡기가 매우 어려", "language": "ko"}, {"title": "네덜란드 방사청장 “무기 급한 유럽, 韓 방산 생산력 주목”", "url": "https://www.hankyung.com/article/202606196797i", "source": "한국경제 경제", "published": "2026-06-19T05:53:17+00:00", "summary": "", "language": "ko"}, {"title": "K-방산, ‘국가성장엔진’ 대전환… ‘선순환 공식’ 확인됐다 - 아시아투데이", "url": "https://news.google.com/rss/articles/CBMibkFVX3lxTE9QZEJscWEyOHdxNy1ubFBERjRNRDQ2R2VobF9zYTVoNnFTaUlNVGR4Qm50ZzNObktOU0phWWhZMDJtYkdwd2xmWnhmSVNiR2JHT2xoUzRSTm54Qy14NUhKVU9xV3hTMWIwdkl6ZXR3?oc=5", "source": "방산 뉴스", "published": "2026-06-19T05:51:12+00:00", "summary": "K-방산, ‘국가성장엔진’ 대전환… ‘선순환 공식’ 확인됐다    아시아투데이", "language": "ko"}, {"title": "[속보]李 \"미국이 북한과 대화할 수 있는 유일한 상대…핵·미사일 추가 개발 중단으로 협상해야\"", "url": "https://www.newsis.com/view/NISX20260619_0003676083", "source": "뉴시스", "published": "2026-06-19T05:47:58+00:00", "summary": "후속기사가 이어집니다 \n◎공감언론 뉴시스 kje1321@newsis.com", "language": "ko"}, {"title": "정동영, 국방백서 논란에 \"李정부, 尹적대정책 계승 정부 아냐\"", "url": "https://www.newsis.com/view/NISX20260619_0003676053", "source": "뉴시스", "published": "2026-06-19T05:45:18+00:00", "summary": "[서울=뉴시스] 남빛나라 기자 = 국방백서에 북한을 '적'으로 규정할 지를 놓고 통일부와 국방부 간 이견이 노출된 가운데 정동영 통일부 장관은 \"이재명 정부는 윤석열 정부의 적대대결 정책 계승 정부는 아니다\"라고 19일 밝혔다. 정 장관은 이날 오후 서울 국립평화통일민주교육원에서 열린 '제25기 평화통일민주교육위원 출범식' 참석 전 기자들과 만나 관련 질문을 받고 이 같이 답했다. 정 장관은 \"국가안전보장회의(NSC)에서 논의해야 한다\"면서도 \"(이재명 정부는) 민주 정부의 계승 정부다. 김대중 정부, 노무현 정부, 문재인 정부, ", "language": "ko"}, {"title": "[속보] 李대통령, 트럼프에 국방비 증액·자주국방 기조 설명", "url": "https://www.yna.co.kr/view/AKR20260619105300001", "source": "연합뉴스", "publish const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
