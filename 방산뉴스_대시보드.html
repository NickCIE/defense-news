"2026-06-27T03:29:06+00:00", "summary": "[서울=뉴시스]이다솜 기자 = 6·3 지방선거 투표용지 부족 사태를 규탄하는 개표소 봉쇄 시위가 23일째 이어지는 가운데 주말 무더위 속에 시위 참가자가 감소하고 청년층 비중도 줄었다. 27일 뉴시스 취재를 종합하면 이날 오전 11시께 서울 송파구 올림픽공원 핸드볼경기장 일대에는 시위 참가자들이 1-3게이트를 중심으로 집결해 '부정선거 재선거', '당일투표 수개표' 등의 구호를 외치고 있다. 지난 주말과 달리 젊은 참가자는 드문드문 보였고, 시위를 주도하는 인원은 50대 이상 중장년층이 대부분이었다. 주말인 만큼 유모차를 끌고 나온", "language": "ko"}, {"title": "특검, 조성현 내란혐의 입건…계엄 때 \"서강대교 넘지 말라\"", "url": "https://www.newsis.com/view/NISX20260627_0003685989", "source": "뉴시스", "published": "2026-06-27T00:48:08+00:00", "summary": "[서울=뉴시스]이승주 기자 = 3대 특검(내란·김건희·순직해병)의 나머지 사건을 들여다보는 2차 종합특별검사팀이 조성현 전 육군 수도방위사령부 제1경비단장(대령)을 피의자로 입건했다.  27일 법조계에 따르면 2차 특검팀(특별검사 권창영)은 최근 조 대령을 내란 중요임무종사 혐의로 입건해 수사 중이다.  특검팀은 조 대령이 12·3 비상계엄 당시 이진우 전 수방사령관의 국회 출동 지시를 제2특임대대와 제35특임대대에 하달한 것으로 보고 있다.  특검팀은 조 대령이 계엄 당일 '의원들을 끌어내라'는 이 전 사령관의 지시에 따라 서강대", "language": "ko"}, {"title": "김용범 \"우리만의 팔란티어·앤두릴 키워야…韓 방산 신기원 시작하려 해\"", "url": "https://www.newsis.com/view/NISX20260627_0003685986", "source": "뉴시스", "published": "2026-06-27T00:38:00+00:00", "summary": "[서울=뉴시스]김경록 기자 = 김용범 청와대 정책실장은 27일 \"우리는 우리만의 팔란티어와 앤두릴을 키워야 한다\"며 \"우리는 지금, 대한민국 방위산업의 새로운 신기원을 시작하려 한다\"고 밝혔다. 김 실장은 이날 오전 페이스북에 \"대한민국 방위산업의 첫 번째 신화는 총과 전차, 자주포를 만드는 나라가 된 것이었다. 이제 두 번째 신화는 AI와 우주, 사이버 기술로 미래의 안보를 만드는 나라가 되는 것\"이라며 이같이 적었다. 김 실장은 \"우리 방산기업들은 정말 잘하고 있다. 하지만 신안보 시대에도 지금의 플레이어들만으로 충분할까. AI", "language": "ko"}, {"title": "전북대, 국내 핵심 방산기업과 채용연계형 산학협력 본격화 - 전자신문", "url": "https://news.google.com/rss/articles/CBMiTkFVX3lxTE1xVnYxNGdfUDJsZlkxZG9SSm1PalhMdG9kcWVmWnZtc3B6ZjBYUnQxX2VxaHFNeFQ0T3UzZjcxX05FcHNIVWdyOVVkVTZidw?oc=5", "source": "방산 뉴스", "published": "2026-06-27T00:35:00+00:00", "summary": "전북대, 국내 핵심 방산기업과 채용연계형 산학협력 본격화    전자신문", "language": "ko"}, {"title": "특검, '다리 넘지말라' 조성현 前수방사 경비단장 내란혐의 입건", "url": "https://www.yna.co.kr/view/AKR20260627017600004", "source": "연합뉴스", "published": "2026-06-26T23:30:00+00:00", "summary": "(서울=연합뉴스) 최윤선 기자 = 3대 특검 이후 남은 의혹을 수사하는 권창영 2차 종합특별검사팀이 조성현 전 육군 수도방위사령부 제1경비단장(...", "language": "ko"}, {"title": "美, ‘대북 창구’ 스웨덴과 고위급 협의…\"北비핵화 전념\"(종합)", "url": "https://www.newsis.com/view/NISX20260627_0003685930", "source": "뉴시스", "published": "2026-06-26T22:11:10+00:00", "summary": "[워싱턴=뉴시스] 이윤희 특파원 = 도널드 트럼프 미국 행정부가 26일(현지 시간) 북한과 외교관계를 유지하고 있는 스웨덴과 고위급 협의를 진행했다.  토머스 디나노 미 국무부 군비통제·국제안보 담당 차관은 이날 워싱턴DC 국무부 청사에서 피터 셈네비 스웨덴 한반도특사와 면담했다.  트럼프 2기 행정부 들어 미국과 스웨덴이 북한 문제 관련 고위급 협의를 진행한 것은 이번이 처음이다.  스웨덴은 서구 국가로서는 처음으로 북한과 수교해 남북한 모두와 외교관계를 맺고 있다. 북한과 외교 관계가 없는 서방국가들의 이익대표국으로도 평가된다.", "language": "ko"}, {"title": "US strikes Iranian missile, drone, radar sites", "url": "https://www.defensenews.com/news/your-military/2026/06/26/us-resumes-attacks-on-iran/", "source": "Defense News", "published": "2026-06-26T22:08:28+00:00", "summary": "The U.S. struck Iranian missile, drone and radar sites on Friday, U.S. Central Command said.", "language": "en"}, {"title": "문 잠긴 핸드볼경기장 3주…경찰, '강제해산' 출구 못 찾나 안 찾나", "url": "https://www.newsis.com/view/NISX20260626_0003685012", "source": "뉴시스", "published": "2026-06-26T22:00:00+00:00", "summary": "[서울=뉴시스] 조성하 기자 = 6·3 지방선거 개표함이 보관된 서울 송파구 올림픽공원 핸드볼경기장 봉쇄 시위가 3주 넘게 이어지면서 폭행, 업무방해 등 각종 불법행위 등이 잇따르고 있다. 하지만 경찰은 강제해산 대신 현장 관리 기조를 유지하는 모습이다. 정치적 부담과 법 적용의 모호성, 향후 여론 변화 등 복합적인 요인이 얽히면서 경찰이 쉽게 '출구 전략'을 찾지 못하고 있다는 분석이 나온다. 27일 뉴시스 취재를 종합하면 경찰은 불법행위에 대해서는 엄정 대응한다는 원칙을 유지하면서도 시위 자체에 대한 강제 해산 등 적극 개입은 ", "language": "ko"}, {"title": "How the Pentagon is shaping its next cyber strategy", "url": "https://breakingdefense.com/2026/06/how-the-pentagon-is-shaping-its-next-cyber-strategy/", "source": "Breaking Defense", "published": "2026-06-26T21:16:51+00:00", "summary": "Drawing on Breaking Defense’s TechNet Cyber 2026 coverage, this eBook examines how the Pentagon is advancing AI, cybersecurity, and cyber strategy to strengthen the future force.", "language": "en"}, {"title": "[오늘의 주요일정]정치(6월27일 토요일)", "url": "https://www.newsis.com/view/NISX20260626_0003685870", "source": "뉴시스", "published": "2026-06-26T20:00:00+00:00", "summary": "◇ const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
