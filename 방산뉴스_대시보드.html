 소비자 정책 등이 논의", "language": "ko"}, {"title": "李대통령 \"기술이 승패 가른다…팔란티어 경쟁할 혁신기업 육성\"", "url": "https://www.yna.co.kr/view/AKR20260626115200001", "source": "연합뉴스", "published": "2026-06-26T06:37:29+00:00", "summary": "(서울=연합뉴스) 임형섭 황윤기 기자 = 이재명 대통령은 26일 \"기술 우위가 곧 안보 우위\"라며 \"대한민국이 전통적인 방산 강국에서 글로벌 신...", "language": "ko"}, {"title": "방사청, 'K-방산 청년뉴딜' 본격 추진…신산업 분야 진입 기회 제공", "url": "https://www.newsis.com/view/NISX20260626_0003685439", "source": "뉴시스", "published": "2026-06-26T06:31:24+00:00", "summary": "[서울=뉴시스] 옥승욱 기자 = 방위사업청은 26일 방위산업의 지속 가능한 성장 기반을 마련하고, 청년들에게 미래 신산업 분야 진입 기회를 제공하기 위한 'K-방산 청년 뉴딜정책 지원 방안'을 수립해 본격 추진한다고 밝혔다.  이 지원 방안은 국방기술과 방위산업 생태계를 활용해 '방산분야 일자리 진입·경험' '안착·성장' '혁신·자립'까지 생애주기 단계별로 지원, 현장 중심의 방산 전문인력과 청년 인재의 혁신적인 아이디어를 국방에 적극 유입시키기 위한 사업이다.  1단계 '진입·경험'에서는 채용연계형 계약학과 확대, 청년 대상 방산", "language": "ko"}, {"title": "이 대통령 \"AI·드론 등 신안보 혁신기업 육성…'한국형 인큐텔' 모델 설립 투자 확대\"", "url": "https://www.newsis.com/view/NISX20260626_0003685305", "source": "뉴시스", "published": "2026-06-26T05:44:30+00:00", "summary": "[서울=뉴시스]조재완 기자 = 이재명 대통령은 26일 \"정부는 인공지능, 드론, 사이버 안보, 우주 항공 등 첨단 독점 기술을 보유하는 신안보 혁신기업을 육성하려고 한다\"고 밝혔다.  이 대통령은 이날 오후 청와대에서 '미래 신안보 혁신깅버 육성 전략회의'를 열고 \"대한민국이 전통적인 방산 강국에서 글로벌 신안보 강국으로 거듭나기 위해서는 국가적 차원의 신안보 혁신기업 육성이 무엇보다 중요하다고 판단한다\"며 이같이 말했다.  이 대통령은 \"첨단 반도체, 드론, 로봇 그리고 인공위성, 네트워크 등 민간의 최첨단 혁신 기술은 국가 안보", "language": "ko"}, {"title": "美 전 차관보 \"한미 핵잠 협력, 오커스 수준 비확산 약속해야\"", "url": "https://www.newsis.com/view/NISX20260626_0003685213", "source": "뉴시스", "published": "2026-06-26T05:08:52+00:00", "summary": "[서귀포=뉴시스] 유자비 기자 = 엘리엇 강 전 미국 국무부 국제안보·비확산 담당 차관보는 26일 한국의 핵추진잠수함 도입 논의와 관련해 오커스(AUKUS) 수준의 비확산 기준 아래 추진돼야 한다고 제시하며 협상에는 상당한 시간이 필요할 것으로 내다봤다.  강 전 차관보는 이날 제주 해비치호텔에서 열린 제주포럼 기자회견에서 \"한미가 핵잠에 있어 한국이 원하는 방향으로 협력하는 데 대해 지지한다\"라며 이같이 말했다.  강 전 차관보는 \"한국이 오커스와 동일한 수준의 핵비확산 약속과 헌신을 한다면 핵잠 협력이 앞으로 잘 될 것이라고 본", "language": "ko"}, {"title": "[인사]방사청", "url": "https://www.newsis.com/view/NISX20260626_0003685228", "source": "뉴시스", "published": "2026-06-26T05:06:42+00 고 밝혔", "language": "ko"}, {"title": "민선9기 서천군 비전은 '오늘이 행복하고 내일이 기대되는 서천'", "url": "https://www.yna.co.kr/view/AKR20260626064100063", "source": "연합뉴스", "published": "2026-06-26T01:44:07+00:00", "summary": "(서천=연합뉴스) 정윤덕 기자 = 충남 서천군수직 인수위원회는 민선 9기 서천군 비전을 '오늘이 행복하고 내일이 기대되는 서천'으로 확정했다고 ...", "language": "ko"}, {"title": "북, 6·25 맞아 '서울 사정권' 무기시험…김정은 \"남부국경 화력태세 변화\"(종합)", "url": "https://www.newsis.com/view/NISX20260626_0003684744", "source": "뉴시스", "published": "2026-06-26T01:15:17+00:00", "summary": "[서울=뉴시스] 남빛나라 기자 = 김정은 북한 국무위원장은 6·25전쟁 발발일을 맞아 수도권을 비롯한 남한을 사정권에 두는 무기들의 시험을 참관했다. 북한 노동신문은 김 위원장이 \"25일 국방발전 5개년 목표 수행을 위한 포 및 미사일무력 현대화 사업계획에 따라 국방과학 연구기관들에서 조직한 중요 무기시험을 참관\"했다고 26일 보도했다. 신문은 \"시험들에서는 갱신형 240㎜24관식 방사포(다연장 로켓) 무기체계의 전투적 특성과 전술탄도미사일의 특수사명전투부(탄두) 위력, 155㎜자행평곡사포(자주포) 사거리연장탄의 명중 정확성을 분석", "language": "ko"}, {"title": "이 대통령, 오늘 미래 신안보 전략회의…국방·우주 혁신기업 지원 논의", "url": "https://www.newsis.com/view/NISX20260626_0003684732", "source": "뉴시스", "published": "2026-06-26T01:03:02+00:00", "summary": "[서울=뉴시스]조재완 기자 = 이재명 대통령이 26일 '미래 신안보 혁신기업 육성 전략회의'를 청와대에서 열고 미래 신안보 혁신기업 육성 방향과 국방·우주 분야 지원 방안을 논의한다. 이번 회의는 '신안보 강국 대한민국, 혁신기업이 만든다'를 슬로건으로, 미래 신안보 혁신기업 육성 방향과 국방·우주 분야 지원 방안을 제시하고 현장의 의견을 듣기 위해 마련됐다. 행사에는 국방대학교, 국방과학연구소, 한국항공우주연구원, 국가보안기술연구소, 코리아스타트업포럼, 방산펀드 운용사 등 안보 관련 분야 연구소장과 전문가, 관계기관 인사들이 참석", "language": "ko"}, {"title": "李대통령, 오늘 청와대서 新안보혁신기업 육성 전략회의", "url": "https://www.yna.co.kr/view/AKR20260626045700001", "source": "연합뉴스", "published": "2026-06-26T00:55:41+00:00", "summary": "(서울=연합뉴스) 임형섭 기자 = 이재명 대통령은 26일 청와대에서 '미래 신(新)안보 혁신기업 육성 전략회의'를 열고 방위산업 발전 방향을 논...", "language": "ko"}, {"title": "청와대 \"'위성락·러시아 고위급 회동' 보도 사실 아냐\"", "url": "https://www.hankyung.com/article/2026062694817", "source": "한국경제 정치", "published": "2026-06-26T00:54:57+00:00", "summary": "", "language": "ko"}, {"title": "육군 감찰교육대 내달 1일 창설…권익위와도 교육협력", "url": "https://www.yna.co.kr/view/AKR20260626035800504", "source": "연합뉴스", "published": "2026-06-26T00:49:56+00:00", "summary": "(서울=연합뉴스) 김 const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
