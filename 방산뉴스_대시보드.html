3992/", "source": "Defense One", "published": "2026-06-05T03:20:38+00:00", "summary": "The Trump administration has shifted dozens of military lawyers to temporary jobs as  immigration judges, special attorneys.", "language": "en"}, {"title": "軍대령 방산업체·경찰간부 도로교통공단 취업 '불승인'", "url": "https://www.yna.co.kr/view/AKR20260605051400001", "source": "연합뉴스", "published": "2026-06-05T03:00:04+00:00", "summary": "(서울=연합뉴스) 이상현 기자 = 정부공직자윤리위원회는 퇴직 공직자에 대한 취업심사 결과 국방부 대령들의 방산업체 및 경찰 간부들의 한국도로교통...", "language": "ko"}, {"title": "BS한양, '고덕국제신도시 수자인하우스디' 6월 분양", "url": "https://www.newsis.com/view/NISX20260605_0003657670", "source": "뉴시스 경제", "published": "2026-06-05T02:41:55+00:00", "summary": "[서울=뉴시스]정유선 기자 = BS한양과 대보건설이 경기도 평택시 고덕국제화 계획지구 P2 패키지 사업으로 조성되는 '고덕국제신도시 수자인하우스디'를 6월 분양한다고 5일 밝혔다.  고덕국제신도시 A-67BL에 들어서는 이 단지는 지하 2층~지상 최고 23층, 4개동, 총 403세대 규모로 조성된다. 타입별로 ▲84㎡A 107세대 ▲84㎡B 90세대 ▲84㎡C 59세대 ▲101㎡ 147세대 로 구성된다. 단지는 고덕국제신도시 내 국제교류단지 권역에 위치한다. 국제교류단지는 국제학교와 글로벌 교육·교류 기능, 복합용도개발 등이 계획된", "language": "ko"}, {"title": "\"AI 매출 100배 성장해야\"…스페이스X, 로켓보다 AI에 미래 건다", "url": "https://www.newsis.com/view/NISX20260605_0003657493", "source": "뉴시스 경제", "published": "2026-06-05T02:29:31+00:00", "summary": "[서울=뉴시스]박미선 기자 = 스페이스X가 기업공개(IPO)를 통해 1조1조7700억 달러(약 2705조 원)의 기업가치를 인정받으려면 인공지능(AI) 사업 부문 매출이 2030년까지 약 100배 성장해야 한다는 전망이 나왔다. 4일(현지 시간) 파이낸셜타임스(FT)에 따르면 스페이스X IPO 대표 주관사인 골드만삭스는 잠재 투자자들에게 AI 사업 부문 매출이 지난해 32억 달러(약 5조 원)에서 2030년 3220억 달러(약 498조 원)로 증가할 것으로 내다봤다. 같은 기간 스페이스X 전체 매출은 지난해 187억 달러(약 29조", "language": "ko"}, {"title": "'원유·LNG 도입↑' 한·캐나다 전략적 공급망 동맹 기대감↑", "url": "https://www.newsis.com/view/NISX20260602_0003653196", "source": "뉴시스 경제", "published": "2026-06-05T02:11:37+00:00", "summary": "[세종=뉴시스]김동현 기자 = 우리나라와 캐나다가 미래첨단산업 분야에 있어 협력을 강화하기로 함에 따라 향후 핵심 광물 공급망 협력, 북미 공급망 편입, 원전 협력 등의 분야에서 시너지가 본격화될 수 있다는 기대감이 커지고 있다.  글로벌 공급망 재편과 미중 갈등 심화, 글로벌 주요 국가의 경제 블록 확대 등을 고려할 때 양국 간 협력은 단순히 산업 협력에 그치지 않고 향후 전략적 공급망 동맹 수준으로 확대될 가능성이 높다는 진단이다. 5일 산업통상부에 따르면 지난 1일(현지시간) 우리나라 전략경제협력 대통령 특사단은 캐나다 정부와", "language": "ko"}, {"title": "한·세르비아 CEPA 타결…반도체 관세 철폐, 친환경차 시장 개방", "url": "https://www.newsis.com/view/NISX20260605_0003657298", "source": "뉴시스 경제", "published": "2026-06-05T02:00:00+00:00", "summary": "[세종=뉴시스]손차민 기자 = 우리나라와 세르비아의 포괄적경제동반자협정(CEPA)이 타결됐다. 발칸 국가와는 최초로 체결하는 자유무역협정(FTA)으로, 반도체·전기차·자동차 부품 등 우리 주력 수출품의 시장 진출 확대가 기대된다. 여한구 산업통상부 통상교섭본부장은 5일(현지 시간) 세르비아 베오그라드에서 야고다 라자레비치(Jagoda Lazarević) 세르비아 대내외무역부 장관과 한-세르비아 CEPA 협상 타결을 공식 선언하고, 공동선언문에 서명했다. 양측은 품목수 기준 90.2%, 수입액 기준 96% 이상의 관세 철폐에 합의했다", "language": "ko"}, {"title": "House passes Ukraine aid bill with new sanctions for Russia", "url": "https://breakingdefense.com/2026/06/house-passes-ukraine-aid-bill-with-new-sanctions-for-russia/", "source": "Breaking Defense", "published": "2026-06-05T01:30:51+00:00", "summary": "House members voted 226-195 to pass the Ukraine Support Act, which authorizes $8 billion in military finance loans to Ukraine and extends the Ukraine Security Assistance Initiative through 2027.", "language": "en"}, {"title": "AI가 사이버전 무기로…앤트로픽, NSA에 엔지니어 파견", "url": "https://www.newsis.com/view/NISX20260605_0003657316", "source": "뉴시스 경제", "published": "2026-06-05T01:10:54+00:00", "summary": "[서울=뉴시스]박미선 기자 = 인공지능(AI) 스타트업 앤트로픽이 국방부와 법적 분쟁을 벌이는 와중에도 미국 국가안보국(NSA)에 자사 AI 모델 '클로드 미토스(이하 미토스)'를 공격형 사이버 작전에 활용할 수 있도록 엔지니어를 직접 파견한 것으로 드러났다. 4일(현지 시간) 파이낸셜타임스(FT)는 복수의 관계자를 인용해 앤트로픽이 약 6명의 직원을 NSA에 '전방 배치 엔지니어' 형태로 파견해 미토스 활용을 지원하고 특정 목적에 맞게 모델을 조정하는 역할을 맡기고 있다고 보도했다. 이들이 실제 사이버 작전에 직접 참여하고 있는지", "language": "ko"}, {"title": "남부발전, 전력피크 대비 하동빛드림본부 안전점검 실시", "url": "https://www.newsis.com/view/NISX20260605_0003657338", "source": "뉴시스 경제", "published": "2026-06-05T00:21:11+00:00", "summary": "[세종=뉴시스]이수정 기자 = 한국남부발전은 김준동 사장이 여름철 전력피크 기간을 대비해 하동빛드림본부를 방문해 주요 설비 현장을 직접 점검했다고 5일 밝혔다. 김 사장은 보일러 무더위 쉼터와 지하케이블룸, 탈황설비 흡수탑 등 발전 현장을 차례로 점검했다.  우선 기록적인 폭염에 대비해 마련된 보일러 무더위 쉼터에서 냉방장치와 편의시설 구비 현황을 세밀히 살폈다. 이어 지하케이블룸·지하전력구를 방문해 우기(雨期) 대비 침수 방지 핵심 설비인 배수펌프의 운전 상태를 확인했다. 탈황설비 흡수탑에서는 김 사장이 드론을 조작하며 최신 기 const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
