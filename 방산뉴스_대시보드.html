ge": "ko"}, {"title": "美국무부 인권 차관보, 北 억류 선교사 가족 면담", "url": "https://www.newsis.com/view/NISX20260610_0003664311", "source": "뉴시스", "published": "2026-06-10T08:02:45+00:00", "summary": "[서울=뉴시스] 남빛나라 기자 = 방한한 미국 백악관·국무부 인사들이 북한에 10년 넘게 억류 중인 최춘길 선교사의 아들 최진영 씨를 면담했다.  최진영 북한억류국민가족회 설립대표는 라일리 반스 미 국무부 민주주의·인권·노동국(DRL) 차관보, 줄리 터너 미 국무부 DRL 부차관보 대행, 벨시스 로메로 백악관 신앙사무국 연락관 등을 지난 9일 서울에서 면담했다고 10일 밝혔다. 현재 북한은 한국인 김정욱·김국기·최춘길 선교사 3명을 억류하고 있다.  최 대표는 면담에서 도널드 트럼프 미국 대통령이 이들의 석방을 김정은 북한 국무위원", "language": "ko"}, {"title": "핵추진잠수함 범정부협의체 2차회의…핵잠 특별법 내용 등 논의", "url": "https://www.newsis.com/view/NISX20260610_0003664329", "source": "뉴시스", "published": "2026-06-10T08:01:48+00:00", "summary": "[서울=뉴시스] 옥승욱 기자 = 국방부는 10일 '핵추진잠수함 범정부협의체(TF)' 제2차 전체회의를 개최하고 핵추진잠수함 특별법 주요 내용 등을 논의했다고 밝혔다.  이번 회의는 지난해 12월 '제1차 핵추진잠수함 범정부협의체 전체회의' 이후 두 번째로 열린 전체회의다. 그동안 관계부처·기관이 협의를 통해 추진해 온 주요 과업의 이행 현황을 점검하고 향후 추진방향을 논의하기 위해 마련됐다.  국방부 별관 회의실에서 열린 이번 회의에서 참석자들은 ▲핵추진잠수함 특별법 주요 내용 및 향후 입법추진 방향 ▲핵추진잠수함용 원자력안전규제체", "language": "ko"}, {"title": "제35대 해군작전사령관에 곽광섭 중장 취임", "url": "https://www.yna.co.kr/view/AKR20260610146500051", "source": "연합뉴스", "published": "2026-06-10T07:58:47+00:00", "summary": "(부산=연합뉴스) 손형주 기자 = 해군의 작전과 훈련을 지휘하는 제35대 해군작전사령관에 곽광섭 중장이 10일 취임했다.", "language": "ko"}, {"title": "[영상] 이란에 격추된 아파치…최초로 무인 수상드론 투입 조종사 구조", "url": "https://www.yna.co.kr/view/AKR20260610144400704", "source": "연합뉴스", "published": "2026-06-10T07:55:31+00:00", "summary": "(서울=연합뉴스) 호르무즈 해협 상공을 순찰하던 미국의 아파치 헬기를 격추한 건 이란의 드론(무인항공기)인 것으로 확인되고 있습니다.", "language": "ko"}, {"title": "광주 구청장협, 시군구청장협으로 재편…교부금 확보 '최우선'", "url": "https://www.newsis.com/view/NISX20260610_0003664248", "source": "뉴시스", "published": "2026-06-10T07:27:14+00:00", "summary": "[광주=뉴시스]이영주 기자 = 7월 전남광주통합특별시 출범을 앞두고 광주·전남지역 단체장 협의체가 대대적인 재편을 앞두고 있다. 10일 지역 정가에 따르면 광주 5개 구청장들은 이달 30일 민선 8기 마지막 구청장협의회를 열어 통합특별시 출범 이후 운영 방향과 현안을 논의할 예정이다. 기존 광주 구청장협의회는 통합특별시 출범과 함께 전남 22개 시·군 단체장이 참여하는 '전남광주통합특별시 시군구청장협의회'로 재편될 전망이다. 새 협의회는 광주 자치구와 전남 시·군 간 공동 현안을 조율하고 function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
</body>
</html>
