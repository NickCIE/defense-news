https://www.newsis.com/view/NISX20260618_0003674929", "source": "뉴시스", "published": "2026-06-18T08:27:15+00:00", "summary": "[서울=뉴시스] 박준호 유자비 기자 = 외교부는 18일 미국·이란의 종전 합의안에 이란의 재건 및 경제개발계획 명목으로 최소 3000억달러를 조성하는 방안이 포함된 것과 관련, 향후 협상 합의안 이행 상황을 주시하면서 관련국 동향도 파악할 계획이라고 밝혔다.  외교부 당국자는 이날 기자들과 만나 \"양해각서상 이란의 재건 및 경제 개발 계획 이름으로 3000억불 재원 조성 관련 내용이 포함이 되어 있고 앞으로 60일 동안 진행될 이란 핵 문제에 관한 최종 합의와 연계되어 있는 사항으로 알고 있다\"며 \"외교부는 앞으로 진행될 관련 논의", "language": "ko"}, {"title": "SP삼화, 페인트 넘어 방산 공략", "url": "https://www.hankyung.com/article/2026061850991", "source": "한국경제 경제", "published": "2026-06-18T08:25:11+00:00", "summary": "", "language": "ko"}, {"title": "국방차관, 육군 2군단 방문…여름철 재난대비 태세 점검", "url": "https://www.yna.co.kr/view/AKR20260618149900504", "source": "연합뉴스", "published": "2026-06-18T08:18:58+00:00", "summary": "(서울=연합뉴스) 김효정 기자 = 이두희 국방부 차관이 18일 육군 제2군단을 방문해 여름철 집중호우 대비태세를 점검했다고 국방부가 밝혔다.", "language": "ko"}, {"title": "K-방산·조선, 유럽시장 다시 정조준 이유는? [비즈360] - 헤럴드경제", "url": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE9QZmpVZGVwdUM0ejZyNXNLS2RmZ3duOE9XdTJfOG9pQk8xS0dPaEdpN3A0RXR3N29ON0QwVkxJVVNxRzl2X1prX2x0MmtLTzFaUm4yM1VB?oc=5", "source": "방산 뉴스", "published": "2026-06-18T08:00:00+00:00", "summary": "K-방산·조선, 유럽시장 다시 정조준 이유는? [비즈360]    헤럴드경제", "language": "ko"}, {"title": "Defense Business Brief: Tech Summit recap; Invoking the Defense Production Act; and INDOPACOM’s name change", "url": "https://www.defenseone.com/business/2026/06/defense-business-brief-tech-summit-recap-invoking-defense-production-act-and-indopacoms-name-change/414267/", "source": "Defense One", "published": "2026-06-18T07:45:14+00:00", "summary": "", "language": "en"}, {"title": "이두희 국방부 차관, 하계 집중호우 재난대비태세 점검", "url": "https://www.newsis.com/view/NISX20260618_0003674806", "source": "뉴시스", "published": "2026-06-18T07:35:04+00:00", "summary": "[서울=뉴시스] 옥승욱 기자 = 이두희 국방부차관은 18일 육군 제2군단을 방문해 재난예방공사 추진 현황과 하계 집중호우 대비태세를 점검하고, 장병 및 부대시설의 안전관리 실태를 확인했다.  이번 현장점검은 하계 집중호우와 태풍에 대비해 재해 취약요인을 사전에 점검하고, 장병과 부대의 안전을 확보하기 위해 마련됐다.  이 차관은 상습 침수 및 붕괴 우려지역의 법사면 보강, 배수시설 정비 등 2군단 지역 재난예방공사 현장을 직접 점검했다.  그는 \"재난은 발생 이후의 대응보다 사전에 얼마나 철저히 준비하는냐에 따라 피해 규모가 달라진", "language": "ko"}, {"title": "국힘 \"한미동맹, 골프로 단단해지지 않아…공석인 AI 수석부터 임명해야\"", "url": "https://www.newsis.com/view/NISX20260618_0003674801", "source": "뉴시스", "published": "2026-06-18T07:32:08+00:00", "summary": "[서울=뉴시스]우지은 기자 = 최은석 국민의힘 원내수석대변인은 18일 이재명 대통령을 향해 \"공석인 AI(인공지능) 수석부터 즉각 임명하고, 사실상 방치된 국가 AI 정책 컨트롤타워를 정상화하라\"고 했다. 최 원내수석대변인은 이날 오전 논평을 통해 \"한미동맹은 골프 약속으로 단단해지는 것이 아니다\"라며 이같이 말했다. 최 원내수석대변인은 \"워싱턴포스트에 따르면 미국 정부가 앤스로픽(미국 AI기업) 최첨단 AI 모델에 대한 외국인 접근을 차단한 결정적 계기 중 하나가 '중국과 연계된 것으로 의심되는 한국 통신사'였다고 한다\"며 \"대한", "language": "ko"}, {"title": "軍, '나홀로 관사' 없애고 커뮤니티 시설 갖춘 대단지로 전환", "url": "https://www.yna.co.kr/view/AKR20260618136900504", "source": "연합뉴스", "published": "2026-06-18T07:17:39+00:00", "summary": "(서울=연합뉴스) 김철선 기자 = 국방부가 소규모로 산재한 군부대 '나홀로 관사'를 정주 여건이 우수한 지역에 대규모 단지 형태로 전환하는 등 ...", "language": "ko"}, {"title": "제23회 병역명문가 시상식 개최…올해 25가문 수상", "url": "https://www.newsis.com/view/NISX20260618_0003674752", "source": "뉴시스", "published": "2026-06-18T07:08:13+00:00", "summary": "[서울=뉴시스] 옥승욱 기자 = 병무청은 18일 제23회 병역명문가 시상식을 열고 병역의무를 성실히 이행한 병역명문가 25가문을 표창했다고 밝혔다.  '병역명문가'란 1대 할아버지부터 손자까지 3대 가족 모두 현역복무 등을 성실히 마친 가문을 말한다. 2004년부터 시작해 올해로 23년째를 맞았으며 총 1만511가문, 4만7738명이 선정됐다.  이날  서울 송파 시그니엘서울에서 열린 시상식에서는 대통령 표창 2가문, 국무총리 표창 4가문, 국방부장관 표창 8가문, 국가보훈부장관 표창 2가문, 병무청장 표창 9가문 등 25가문이 수", "language": "ko"}, {"title": "닻 올린 한미전략투자공사…\"한미동맹, 첨단전략산업까지 진화\"(종합)", "url": "https://www.yna.co.kr/view/AKR20260618079451002", "source": "연합뉴스", "published": "2026-06-18T07:00:01+00:00", "summary": "(세종=연합뉴스) 김수현 송정은 기자 = 18일 대미 전략적 투자 전담 기구인 한미전략투자공사(이하 공사)가 공식 출범했다.", "language": "ko"}, {"title": "안규백 장관 \"군 가족 안정적 주거 위해 지속 지원할 것\"", "url": "https://www.newsis.com/view/NISX20260618_0003674680", "source": "뉴시스", "published": "2026-06-18T06:47:40+00:00", "summary": "[서울=뉴시스] 옥승욱 기자 = 안규백 국방부 장관이 군인이 근무에 전념할 수 있도록 안정적인 주거에 지속적인 관심을 가지고 지원할 것이라고 했다.  국방부는 안 장관이 18일 오전 육군 제15사단의 군 주거 시설을 방문하고, 군인 및 군 가족들과 간담회를 가졌다고 밝혔다.  안 장관은 강원도 화천 다목리 소재의 관사와 간부숙소를 직접 확인하고, 전방부대의 주거 여건과 개선이 필요한 사항을 점검했다. 이어 군인 및 군 가족과 함께하는 간담회에서 군 주거 정책의 수요자인 군 가족의 의견을 청취하고 현장 소통을 통해 군인가족이 체감할 ", "language": "ko"}, {"title": "중부발전, 구내식당 휴무로 지역경제·근로환경 잡는다", "url": "https://www.newsis.com/view/NISX20260618_0003674666", "source": "뉴시스 경제", "published": "2026-06-18T06:42:53+00:00", "summary": "[세종=뉴시스]여동준 기자 = 한국중부발전이 지역경제 활성화와 구내식당 근로자 근로환경 개선을 위해 구내식당 휴무제를 시행한다. 중부발전은 이달부터 지역경제 활성화와 식당 근로자의 근로환경 개선을 위해 월 1회 및 징검다리 연휴기간 구내식당 휴무제를 시행한다고 18일 밝혔다. 이번 제도는 정부의 구내식당 휴무제 정책기조에 부응하고 지역 소상공인과 상생하기 위해 마련됐다. 구내식당 종사자의 휴식권을 보장하기 위한 취지도 담겼다. 중부발전 노사는 월 1회 휴무제뿐 아니라 징검다리 연휴기간과 3일 이상 연휴 직전일 석식도 휴무하기로 했다", "language": "ko"}, {"title": "\"국방시설 품질 높인다\"…건설협회·국방시설본부, 상생 협력 '맞손'", "url": "https://www.newsis.com/view/NISX20260618_0003674683", "source": "뉴시스 경제", "published": "2026-06-18T06:41:09+00:00", "summary": "[서울=뉴시스] 박성환 기자 = 대한건설협회와 국방시설본부가 국방시설 품질 향상과 건설산업 발전을 위한 협력 체계를 구축한다. 대한건설협회는 18일 서울 강남구 건설회관에서 국방시설본부와 업무협약(MOU)을 체결하고 상생협력 방안을 논의했다.  이번 협약은 국방시설의 시공 품질을 높여 국방력 강화에 기여하고, 제도 개선과 협력 확대를 통해 건설업계 발전 기반을 마련하기 위해 추진됐다. 양 기관은 앞으로 ▲건설산업 관련 정책·제도 개선 과제 발굴 및 제안 ▲부실시공 예방과 품질 제고를 위한 협력 ▲적정 공사비 반영 등 분야에서 협력한", "language": "ko"}, {"title": "어린이날 행사서 쓰러진 임신부 이송 도운 12사단 장병들", "url": "https://www.yna.co.kr/view/AKR20260618121300062", "source": "연합뉴스", "published": "2026-06-18T06:16:38+00:00", "summary": "(인제=연합뉴스) 박영서 기자 = 강원 인제군은 지난 어린이날 행사 현장에서 신속한 의료지원으로 주민 안전에 이바지한 육군 제12사단 의무대대 ...", "language": "ko"}, {"title": "[게시판] 건설협회·국방시설본부, 상생협력 업무협약", "url": "https://www.yna.co.kr/view/AKR20260618115100003", "source": "연합뉴스 경제", "published": "2026-06-18T06:04:13+00:00", "summary": "▲ 대한건설협회는 18일 국방시설본부와 상생 협력을 위한 업무협약을 맺고 건설산업 관련 정책·제도 개선 과제 발굴, 부실시공 예방 및 시공 품질...", "language": "ko"}, {"title": "영월 상동 몰리브덴 시추 '긍정적'…전략광물 국산화 기대감 커", "url": "https://www.yna.co.kr/view/AKR20260618116800062", "source": "연합뉴스", "published": "2026-06-18T06:00:24+00:00", "summary": "(영월=연합뉴스) 이재현 기자 = const BADGE = {
  "Reuters":"b-reuters","CNBC":"b-cnbc","CNBC World":"b-cnbc",
  "Breaking Defense":"b-breaking-defense","Breaking Defense (GNews)":"b-breaking-defense",
  "The War Zone":"b-the-war-zone","Defense One":"b-defense-one",
  "Defense News":"b-defense-news","New York Times":"b-new-york-times",
  "연합뉴스":"b-연합뉴스","연합뉴스 경제":"b-연합뉴스",
  "뉴시스":"b-뉴시스","뉴시스 경제":"b-뉴시스",
  "조선비즈":"b-조선비즈","한국경제":"b-한국경제",
  "한국경제 정치":"b-한국경제","한국경제 경제":"b-한국경제","한국경제 국제":"b-한국경제",
  "방산 뉴스":"b-방산-뉴스",
};

let activeLang = "", activeSrc = "";

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function rel(iso){
  try {
    const d = (Date.now() - new Date(iso)) / 1000;
    if(d < 3600) return Math.floor(d/60)+"분 전";
    if(d < 86400) return Math.floor(d/3600)+"시간 전";
    if(d < 172800) return "어제";
    const dt = new Date(iso);
    return (dt.getMonth()+1)+"/"+ dt.getDate();
  } catch{ return ""; }
}

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const items = ALL.filter(a => {
    if(activeLang && a.language !== activeLang) return false;
    if(activeSrc  && a.source  !== activeSrc)  return false;
    if(q && !(a.title+a.summary).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("count").textContent = items.length;
  document.getElementById("meta").innerHTML =
    items.length ? `<span>${items.length}</span>건 표시 중` : "";
  const grid = document.getElementById("grid");
  if(!items.length){ grid.innerHTML='<div class="placeholder">표시할 기사가 없습니다.</div>'; return; }
  grid.innerHTML = items.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="badge ${BADGE[a.source]||"b-default"}">${esc(a.source)}</span>
        <span class="card-date">${rel(a.published)}</span>
      </div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a></div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ""}
      <div class="card-footer"><a class="card-link" href="${a.url}" target="_blank" rel="noopener">원문 보기 →</a></div>
    </div>`).join("");
}

function buildSrcFilters(){
  const sources = [...new Set(ALL.map(a => a.source))].sort();
  document.getElementById("srcFilters").innerHTML = sources.map(s =>
    `<button class="filter-btn" data-src="${s}">${s}</button>`).join("");
  document.querySelectorAll("#srcFilters .filter-btn").forEach(b => {
    b.onclick = () => {
      activeSrc = b.dataset.src === activeSrc ? "" : b.dataset.src;
      document.querySelectorAll("#srcFilters .filter-btn").forEach(x => x.classList.remove("active"));
      if(activeSrc) b.classList.add("active");
      render();
    };
  });
}

document.querySelectorAll("#langFilters .filter-btn").forEach(b => {
  b.onclick = () => {
    activeLang = b.dataset.lang;
    document.querySelectorAll("#langFilters .filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});

buildSrcFilters();
render();
</script>
